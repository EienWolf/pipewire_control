<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pw-ctl — PipeWire Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #07090c;
  --surf0:       #0c1018;
  --surf1:       #111820;
  --surf2:       #17202a;
  --border-l:    #161e28;
  --border-m:    #1e2d3c;
  --border-h:    #2a3d50;

  --text-100: #b8ccd8;
  --text-60:  #4e6578;
  --text-30:  #273340;

  --green:   #0fdb72;
  --amber:   #f0a020;
  --slate:   #38505f;
  --blue:    #38a8f0;
  --red:     #f03838;
  --teal:    #20a0b8;

  --sink-c:     #2070d8;
  --source-c:   #10a858;
  --play-c:     #8830e0;
  --cap-c:      #d85010;

  --font-ui:   'Oxanium', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text-100);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.55;
  overflow-x: hidden;
}

/* ── Background ─────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 40%, rgba(0,80,120,.06) 0%, transparent 100%),
    radial-gradient(ellipse 40% 50% at 85% 70%, rgba(0,120,60,.04) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── App ─────────────────────────────────────────────────────── */
#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── Header ──────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: rgba(7,9,12,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-m);
}

.hd-left { display: flex; align-items: center; gap: 14px; }

.logo {
  position: relative;
  width: 28px; height: 28px;
  flex-shrink: 0;
}
.logo-ring {
  position: absolute; inset: 0;
  border: 1.5px solid var(--teal);
  border-radius: 50%;
  animation: logo-spin 8s linear infinite;
}
.logo-ring::before {
  content: '';
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px;
  background: var(--teal);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--teal);
}
.logo-dot {
  position: absolute; inset: 7px;
  background: var(--teal);
  border-radius: 50%;
  opacity: .7;
  animation: logo-pulse 2s ease-in-out infinite;
}
@keyframes logo-spin { to { transform: rotate(360deg); } }
@keyframes logo-pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(.5);opacity:.3} }

h1 {
  font-family: var(--font-ui);
  font-size: 18px; font-weight: 700;
  letter-spacing: .12em; text-transform: lowercase;
  color: var(--teal);
}
.subtitle {
  font-size: 10px;
  color: var(--text-60);
  letter-spacing: .06em;
  border-left: 1px solid var(--border-m);
  padding-left: 14px;
  line-height: 1.3;
}

.hd-right { display: flex; align-items: center; gap: 16px; }

.stat {
  display: flex; align-items: baseline; gap: 4px;
  padding: 0 10px;
  border-right: 1px solid var(--border-l);
}
.stat-n {
  font-family: var(--font-ui); font-size: 20px; font-weight: 600;
  color: var(--text-100);
  transition: color .3s;
}
.stat-l { font-size: 10px; color: var(--text-60); }

/* WS status pill */
.ws-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border: 1px solid var(--border-m);
  border-radius: 20px;
  font-size: 10px;
  letter-spacing: .04em;
  transition: border-color .3s, color .3s;
}
.ws-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  transition: background .3s, box-shadow .3s;
}
.ws-pill.connected   { border-color: var(--green); color: var(--green); }
.ws-pill.connecting,
.ws-pill.reconnecting{ border-color: var(--amber); color: var(--amber); }
.ws-pill.disconnected{ border-color: var(--red);   color: var(--red); }

.ws-pill.connected    .ws-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2.5s ease-in-out infinite; }
.ws-pill.connecting   .ws-dot,
.ws-pill.reconnecting .ws-dot { background: var(--amber); animation: blink .9s ease-in-out infinite; }
.ws-pill.disconnected .ws-dot { background: var(--red); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Main ─────────────────────────────────────────────────────── */
main { flex: 1; padding: 14px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media(max-width:860px){ .grid { grid-template-columns: 1fr; } }

/* ── Section ─────────────────────────────────────────────────── */
.section {
  display: flex; flex-direction: column;
  background: var(--surf0);
  border: 1px solid var(--border-l);
  border-radius: 4px;
  overflow: hidden;
}

.sec-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px 8px;
  border-bottom: 1px solid var(--border-l);
  background: rgba(0,0,0,.25);
  position: relative;
}
.sec-hd::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
}

#s-sinks   .sec-hd { border-top: 2px solid var(--sink-c); }
#s-sources .sec-hd { border-top: 2px solid var(--source-c); }
#s-play    .sec-hd { border-top: 2px solid var(--play-c); }
#s-cap     .sec-hd { border-top: 2px solid var(--cap-c); }

.sec-ico {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
#s-sinks   .sec-ico { color: var(--sink-c); }
#s-sources .sec-ico { color: var(--source-c); }
#s-play    .sec-ico { color: var(--play-c); }
#s-cap     .sec-ico { color: var(--cap-c); }

.sec-title {
  font-family: var(--font-ui);
  font-size: 12px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  flex: 1;
}
.sec-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-60);
  background: var(--border-l);
  padding: 1px 6px; border-radius: 10px;
}

/* ── Node container ──────────────────────────────────────────── */
.nc {
  padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
  min-height: 52px;
}
.nc:empty::after {
  content: 'no nodes';
  display: block;
  text-align: center;
  color: var(--text-30);
  padding: 14px 0;
  font-size: 10px;
  letter-spacing: .06em;
}

/* ── Node card ───────────────────────────────────────────────── */
.card {
  background: var(--surf1);
  border: 1px solid var(--border-l);
  border-left: 3px solid var(--slate);
  border-radius: 3px;
  overflow: hidden;
  transition: opacity .22s ease, transform .22s ease, border-color .3s;
  will-change: transform, opacity;
}
.card:hover { border-color: var(--border-h); background: var(--surf2); }

.card.entering { opacity: 0; transform: translateY(-8px); }
.card.leaving  { opacity: 0; transform: scale(.97) translateY(4px); }

/* State border colours */
.card[data-state="Running"]   { border-left-color: var(--green); }
.card[data-state="Idle"]      { border-left-color: var(--amber); }
.card[data-state="Suspended"] { border-left-color: var(--slate); }
.card[data-state="Creating"]  { border-left-color: var(--blue); }
.card[data-state="Error"]     { border-left-color: var(--red); }

/* ── Card body ───────────────────────────────────────────────── */
.card-body {
  padding: 7px 9px 6px;
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 0 8px;
  align-items: start;
}

/* LED */
.led {
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-top: 4px;
  background: var(--slate);
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
[data-state="Running"]   .led { background: var(--green); box-shadow: 0 0 5px var(--green), 0 0 10px rgba(15,219,114,.25); }
[data-state="Idle"]      .led { background: var(--amber); box-shadow: 0 0 4px var(--amber); animation: blink 2.2s ease-in-out infinite; }
[data-state="Suspended"] .led { background: var(--slate); }
[data-state="Creating"]  .led { background: var(--blue);  animation: blink .6s ease-in-out infinite; }
[data-state="Error"]     .led { background: var(--red);   box-shadow: 0 0 5px var(--red); animation: blink .45s ease-in-out infinite; }

/* Content */
.cc { min-width: 0; }

.card-name {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 500;
  color: var(--text-100);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3;
}

.badges {
  display: flex; flex-wrap: wrap; gap: 3px;
  margin-top: 3px;
}
.badge {
  font-size: 9px;
  padding: 0 4px;
  border: 1px solid;
  border-radius: 2px;
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge-cls  { border-color: var(--text-30); color: var(--text-60); }
.badge-st   { border-color: currentColor; }
[data-state="Running"]   .badge-st { color: var(--green); }
[data-state="Idle"]      .badge-st { color: var(--amber); }
[data-state="Suspended"] .badge-st { color: var(--slate); }
[data-state="Creating"]  .badge-st { color: var(--blue); }
[data-state="Error"]     .badge-st { color: var(--red); }

.card-app {
  margin-top: 2px;
  color: var(--text-60);
  font-size: 10px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-media {
  margin-top: 1px;
  color: var(--text-30);
  font-size: 10px;
  font-style: italic;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pid { color: var(--text-30); font-size: 9px; margin-left: 4px; }

/* Ports column */
.ports {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 2px;
  font-size: 10px; color: var(--text-60);
  white-space: nowrap;
}
.prow { display: flex; align-items: center; gap: 3px; }
.arr-in  { color: var(--blue); }
.arr-out { color: var(--green); }

/* ── Card footer (IDs) ───────────────────────────────────────── */
.card-foot {
  display: flex; flex-wrap: wrap; gap: 0;
  border-top: 1px solid var(--border-l);
}
.kv {
  display: flex; gap: 4px; align-items: baseline;
  padding: 3px 9px 3px 25px;
  border-right: 1px solid var(--border-l);
}
.kv:last-child { border-right: none; }
.kk { font-size: 8px; color: var(--text-30); text-transform: uppercase; letter-spacing: .05em; }
.kv-val { font-size: 9px; color: var(--text-60); }

/* ── Props toggle ────────────────────────────────────────────── */
.props-wrap { border-top: 1px solid var(--border-l); }

.props-toggle {
  display: flex; align-items: center; gap: 5px;
  width: 100%;
  padding: 3px 9px 3px 25px;
  background: none; border: none;
  color: var(--text-60); font-size: 10px;
  font-family: var(--font-mono);
  cursor: pointer; text-align: left;
  transition: color .15s;
}
.props-toggle:hover { color: var(--teal); }
.arr {
  display: inline-block;
  font-size: 8px;
  transition: transform .2s ease;
}
.props-toggle.open .arr { transform: rotate(90deg); }

.props-body {
  display: none;
  padding: 4px 9px 8px 25px;
  max-height: 180px; overflow-y: auto;
}
.props-body.show { display: block; }

.prop {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1.6fr);
  gap: 8px;
  padding: 1px 0;
  font-size: 10px;
}
.pk { color: var(--teal); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pv { color: var(--text-100); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--surf0); }
::-webkit-scrollbar-thumb { background: var(--border-m); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-h); }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="hd-left">
      <div class="logo">
        <div class="logo-ring"></div>
        <div class="logo-dot"></div>
      </div>
      <h1>pw-ctl</h1>
      <span class="subtitle">PipeWire Monitor</span>
    </div>
    <div class="hd-right">
      <div class="stat">
        <span class="stat-n" id="total-n">0</span>
        <span class="stat-l">nodes</span>
      </div>
      <div class="ws-pill connecting" id="ws-pill">
        <div class="ws-dot"></div>
        <span id="ws-txt">Connecting</span>
      </div>
    </div>
  </header>

  <main>
    <div class="grid">

      <div class="section" id="s-sinks">
        <div class="sec-hd">
          <div class="sec-ico">⊗</div>
          <span class="sec-title">Sinks</span>
          <span class="sec-badge" id="cnt-sinks">0</span>
        </div>
        <div class="nc" id="nc-sinks"></div>
      </div>

      <div class="section" id="s-sources">
        <div class="sec-hd">
          <div class="sec-ico">⊙</div>
          <span class="sec-title">Sources</span>
          <span class="sec-badge" id="cnt-sources">0</span>
        </div>
        <div class="nc" id="nc-sources"></div>
      </div>

      <div class="section" id="s-play">
        <div class="sec-hd">
          <div class="sec-ico">▶</div>
          <span class="sec-title">Playback Streams</span>
          <span class="sec-badge" id="cnt-play">0</span>
        </div>
        <div class="nc" id="nc-play"></div>
      </div>

      <div class="section" id="s-cap">
        <div class="sec-hd">
          <div class="sec-ico">◉</div>
          <span class="sec-title">Capture Streams</span>
          <span class="sec-badge" id="cnt-cap">0</span>
        </div>
        <div class="nc" id="nc-cap"></div>
      </div>

    </div>
  </main>
</div>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
const nodes       = new Map();   // id(number) → AudioNode
const expanded    = new Set();   // node ids with open props

// ── Routing map ─────────────────────────────────────────────────────────────
const CLASS_TO_NC = {
  'Audio/Sink':          'nc-sinks',
  'Audio/Source':        'nc-sources',
  'Stream/Output/Audio': 'nc-play',
  'Stream/Input/Audio':  'nc-cap',
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function displayName(n) {
  return n.node_nick || n.node_description || n.node_name || `#${n.id}`;
}

function stateKey(state) {
  if (typeof state === 'string') return state;
  if (state && typeof state === 'object') return 'Error';
  return 'Unknown';
}

function stateLabel(state) {
  if (typeof state === 'string') return state;
  if (state && typeof state === 'object') {
    const key = Object.keys(state)[0];
    const msg = state[key];
    return msg ? `Error: ${msg}` : 'Error';
  }
  return 'Unknown';
}

// ── Card HTML ────────────────────────────────────────────────────────────────
function cardHTML(n) {
  const sk    = stateKey(n.state);
  const sl    = stateLabel(n.state);
  const name  = displayName(n);
  const props = Object.entries(n.extra_props || {});
  const isExp = expanded.has(n.id);

  const appLine = n.application_name
    ? `<div class="card-app">${esc(n.application_name)}${
        n.application_process_id != null
          ? `<span class="pid">pid:${n.application_process_id}</span>` : ''
      }</div>` : '';

  const mediaLine = n.media_name && n.media_name !== displayName(n)
    ? `<div class="card-media">${esc(n.media_name)}</div>` : '';

  const ids = [
    ['id',  n.id],
    ['ser', n.serial ?? '—'],
    ...(n.client_id != null  ? [['cli', n.client_id]]  : []),
    ...(n.device_id != null  ? [['dev', n.device_id]]  : []),
  ].map(([k,v]) => `<div class="kv"><span class="kk">${k}</span><span class="kv-val">${v}</span></div>`).join('');

  const propsBlock = props.length > 0 ? `
<div class="props-wrap">
  <button class="props-toggle${isExp?' open':''}" onclick="toggleProps(${n.id},this)">
    <span class="arr">▶</span> Properties <span style="color:var(--text-30)">(${props.length})</span>
  </button>
  <div class="props-body${isExp?' show':''}">
    ${props.sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>
      `<div class="prop"><span class="pk">${esc(k)}</span><span class="pv" title="${esc(v)}">${esc(v)}</span></div>`
    ).join('')}
  </div>
</div>` : '';

  return `
<div class="card-body">
  <div class="led"></div>
  <div class="cc">
    <div class="card-name" title="${esc(name)}">${esc(name)}</div>
    <div class="badges">
      <span class="badge badge-cls">${esc(n.media_class||'')}</span>
      <span class="badge badge-st">${esc(sl)}</span>
    </div>
    ${appLine}${mediaLine}
  </div>
  <div class="ports">
    <div class="prow"><span class="arr-in">↓</span><span>${n.n_input_ports}</span></div>
    <div class="prow"><span class="arr-out">↑</span><span>${n.n_output_ports}</span></div>
  </div>
</div>
<div class="card-foot">${ids}</div>
${propsBlock}`;
}

// ── DOM ops ──────────────────────────────────────────────────────────────────
function upsertCard(n, isNew) {
  const ncId = CLASS_TO_NC[n.media_class];
  if (!ncId) return;

  const sk = stateKey(n.state);
  let card = document.getElementById(`nd-${n.id}`);

  if (!card) {
    card = document.createElement('div');
    card.className = 'card entering';
    card.id = `nd-${n.id}`;
    card.dataset.state = sk;
    card.innerHTML = cardHTML(n);
    document.getElementById(ncId).appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.remove('entering')));
  } else {
    card.dataset.state = sk;
    card.innerHTML = cardHTML(n);
  }
}

function removeCard(id) {
  const card = document.getElementById(`nd-${id}`);
  if (!card) return;
  card.classList.add('leaving');
  setTimeout(() => { card.remove(); updateCounts(); }, 250);
}

function renderAll() {
  Object.values(CLASS_TO_NC).forEach(ncId => {
    const el = document.getElementById(ncId);
    if (el) el.innerHTML = '';
  });
  for (const n of nodes.values()) upsertCard(n, false);
  updateCounts();
}

function updateCounts() {
  let total = 0;
  const map = { sinks: 'nc-sinks', sources: 'nc-sources', play: 'nc-play', cap: 'nc-cap' };
  for (const [k, ncId] of Object.entries(map)) {
    const nc = document.getElementById(ncId);
    const n  = nc ? nc.children.length : 0;
    document.getElementById(`cnt-${k}`).textContent = n;
    total += n;
  }
  document.getElementById('total-n').textContent = total;
}

// ── Interaction ──────────────────────────────────────────────────────────────
window.toggleProps = function(id, btn) {
  expanded.has(id) ? expanded.delete(id) : expanded.add(id);
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('show');
};

// ── WebSocket ────────────────────────────────────────────────────────────────
let ws = null;
let reconnDelay = 1000;
const MAX_DELAY  = 30_000;

function setStatus(cls, text) {
  const pill = document.getElementById('ws-pill');
  pill.className = `ws-pill ${cls}`;
  document.getElementById('ws-txt').textContent = text;
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'Snapshot':
      nodes.clear();
      msg.data.forEach(n => nodes.set(n.id, n));
      renderAll();
      break;
    case 'NodeAdded':
      nodes.set(msg.data.id, msg.data);
      upsertCard(msg.data, true);
      updateCounts();
      break;
    case 'NodeUpdated':
      nodes.set(msg.data.id, msg.data);
      upsertCard(msg.data, false);
      updateCounts();
      break;
    case 'NodeRemoved':
      nodes.delete(msg.data.id);
      removeCard(msg.data.id);
      break;
  }
}

function connect() {
  setStatus('connecting', 'Connecting…');
  let sock;
  try { sock = new WebSocket('ws://localhost:7878/ws'); }
  catch { return scheduleReconnect(); }
  ws = sock;

  sock.onopen = () => {
    reconnDelay = 1000;
    setStatus('connected', 'Connected');
  };

  sock.onmessage = e => {
    try { handleMsg(JSON.parse(e.data)); }
    catch(err) { console.error('parse error', err); }
  };

  sock.onclose  = () => scheduleReconnect();
  sock.onerror  = () => {};  // onclose fires after onerror
}

function scheduleReconnect() {
  const d = reconnDelay;
  reconnDelay = Math.min(reconnDelay * 1.6, MAX_DELAY);
  setStatus('reconnecting', `Reconnect in ${Math.round(d/1000)}s`);
  setTimeout(connect, d);
}

connect();
</script>
