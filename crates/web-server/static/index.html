  }
  if (kind !== 'lv2') {
    for (const p of ladspaCatalog.values()) {
      items.push({ kind: 'ladspa', name: p.name, sub: `${p.path} (${p.label})`, payloadId: p.key });
    }
  }
  const filtered = items
    .filter(i => !q || i.name.toLowerCase().includes(q) || i.sub.toLowerCase().includes(q))
    .sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()))
    .slice(0, 400);

  list.innerHTML = filtered.map(i => `
    <div class="pp-item" onclick="pickPlugin('${i.kind}', ${JSON.stringify(i.payloadId).replace(/"/g,'&quot;')})">
      <div class="pp-name">${esc(i.name)} <span class="pp-badge pp-badge-${i.kind}">${i.kind.toUpperCase()}</span></div>
      <div class="pp-uri">${esc(i.sub)}</div>
    </div>`).join('') || '<div class="pp-empty">no plugins match</div>';
};
// Cancel + flush every pending debounced control PUT for this preset, so
// in-flight requests can't apply with stale indices after a chain mutation.
function flushChainDebounces(presetId) {
  for (const [k, t] of ctrlDebounce) {
    if (k.startsWith(presetId + ':')) { clearTimeout(t); ctrlDebounce.delete(k); }
  }
}

window.pickPlugin = async function(kind, payloadId) {
  const modal = document.getElementById('plugin-picker');
  const presetId = modal?.dataset?.presetId; if (!presetId) return;
  flushChainDebounces(presetId);
  let body;
  if (kind === 'lv2') {
    body = { kind: 'lv2', plugin_uri: payloadId };
  } else {
    // payloadId is the LADSPA `{path}::{label}` key.
    const sep = payloadId.indexOf('::');
    if (sep < 0) { console.error('bad ladspa key', payloadId); return; }
    body = { kind: 'ladspa', path: payloadId.slice(0, sep), plugin_label: payloadId.slice(sep+2) };
  }
  try {
    await apiFetch('POST', `/presets/${presetId}/chain`, body);
    const updated = await apiFetch('GET', `/presets/${presetId}`);
    presets.set(presetId, updated);
    expandedChainIdx = (updated.chain || []).length - 1;
    closePluginPicker();
    renderPresetDetail();
    syncHash();
  } catch (e) { console.error('pickPlugin', e); }
};

window.removeChainNode = async function(presetId, idx) {
  if (!confirm('Remove this plugin from the chain?')) return;
  flushChainDebounces(presetId);
  try {
    await apiFetch('DELETE', `/presets/${presetId}/chain/${idx}`);
    const updated = await apiFetch('GET', `/presets/${presetId}`);
    presets.set(presetId, updated);
    // Adjust expansion: collapse if we removed it, shift if it was after.
    if (expandedChainIdx === idx) expandedChainIdx = null;
    else if (typeof expandedChainIdx === 'number' && expandedChainIdx > idx) expandedChainIdx--;
    renderPresetDetail();
    syncHash();
  } catch (e) { console.error('removeChainNode', e); }
};
window.moveChainNode = async function(presetId, idx, delta) {
  const p = presets.get(presetId); if (!p) return;
  const to = idx + delta;
  if (to < 0 || to >= p.chain.length) return;
  flushChainDebounces(presetId);
  try {
    await apiFetch('PUT', `/presets/${presetId}/chain/${idx}/move`, { to });
    const updated = await apiFetch('GET', `/presets/${presetId}`);
    presets.set(presetId, updated);
    // Track expansion through the move.
    if (expandedChainIdx === idx) expandedChainIdx = to;
    else if (typeof expandedChainIdx === 'number') {
      if (idx < expandedChainIdx && to >= expandedChainIdx) expandedChainIdx--;
      else if (idx > expandedChainIdx && to <= expandedChainIdx) expandedChainIdx++;
    }
    renderPresetDetail();
    syncHash();
  } catch (e) { console.error('moveChainNode', e); }
};
window.toggleChainBypass = async function(presetId, idx, bypass) {
  try {
    await apiFetch('PUT', `/presets/${presetId}/chain/${idx}/bypass`, { bypass });
    const p = presets.get(presetId);
    if (p && p.chain[idx]) p.chain[idx].bypass = bypass;
  } catch (e) { console.error('toggleChainBypass', e); }
};
window.onChainControl = function(presetId, idx, symbol, value) {
  // Optimistic local update + debounced PUT.
  const p = presets.get(presetId);
  if (p && p.chain[idx]) {
    const k = p.chain[idx].kind;
    if (k && k.controls) k.controls[symbol] = value;
  }
  const key = `${presetId}:${idx}:${symbol}`;
  clearTimeout(ctrlDebounce.get(key));
  ctrlDebounce.set(key, setTimeout(async () => {
    try {
      await apiFetch('PUT', `/presets/${presetId}/chain/${idx}/control`,
                     { symbol, value: parseFloat(value) });
    } catch (e) { console.error('onChainControl', e); }
  }, 400));
};

// Output assignments
window.addOutput = async function(presetId) {
  const sel = document.getElementById(`sink-pick-${presetId}`);
  const nodeName = sel?.value; if (!nodeName) return;
  try {
    await apiFetch('POST', `/presets/${presetId}/outputs`, { node_name: nodeName, volume: 1.0 });
    const updated = await apiFetch('GET', `/presets/${presetId}`);
    presets.set(presetId, updated); renderPresetDetail();
  } catch(e) { console.error('addOutput', e); }
};
window.removeOutput = async function(presetId, idx) {
  try {
    await apiFetch('DELETE', `/presets/${presetId}/outputs/${idx}`);
    const updated = await apiFetch('GET', `/presets/${presetId}`);
    presets.set(presetId, updated); renderPresetDetail();
  } catch(e) { console.error('removeOutput', e); }
};
window.onVolumeChange = function(presetId, idx, val) {
  const v = parseFloat(val);
  const el = document.getElementById(`out-pct-${presetId}-${idx}`);
  if (el) el.value = Math.round(v * 100) + '%';
  clearTimeout(window[`_volT_${idx}`]);
  window[`_volT_${idx}`] = setTimeout(async () => {
    try {
      await apiFetch('PUT', `/presets/${presetId}/outputs/${idx}`, { volume: v });
      const p = presets.get(presetId); if (p?.outputs[idx]) p.outputs[idx].volume = v;
    } catch(e) { console.error('updateVolume', e); }
  }, 400);
};

// Stream routing
window.addSourceInput = async function(presetId) {
  const sel = document.getElementById(`src-pick-${presetId}`);
  if (!sel || !sel.value) return;
  try {
    await apiFetch('POST', `/presets/${presetId}/source-inputs`, { node_name: sel.value });
    const p = presets.get(presetId);
    if (p) { p.source_inputs = p.source_inputs ?? []; p.source_inputs.push(sel.value); }
    renderPresetDetail();
  } catch(e) { console.error('addSourceInput', e); }
};

window.removeSourceInput = async function(presetId, idx) {
  try {
    await apiFetch('DELETE', `/presets/${presetId}/source-inputs/${idx}`);
    const p = presets.get(presetId);
    if (p) p.source_inputs.splice(idx, 1);
    renderPresetDetail();
  } catch(e) { console.error('removeSourceInput', e); }
};

window.routeStream = async function(presetId, nodeId) {
  try {
    await apiFetch('POST', `/presets/${presetId}/route/${nodeId}`);
    setTimeout(() => { if (currentTab === 'presets') renderPresetDetail(); }, 300);
  } catch(e) { console.error('routeStream', e); }
};
window.unrouteStream = async function(presetId, nodeId) {
  try {
    await apiFetch('POST', `/presets/${presetId}/unroute/${nodeId}`);
    setTimeout(() => { if (currentTab === 'presets') renderPresetDetail(); }, 300);
  } catch(e) { console.error('unrouteStream', e); }
};

// ── Preset renders ────────────────────────────────────────────────────────────
function renderPresetList() {
  const list = document.getElementById('preset-list'); if (!list) return;
  const items = [...presets.values()].map(p => {
    const active = isPresetActive(p), sel = p.id === selectedPresetId;
    return `<div class="preset-item${active?' active':''}${sel?' selected':''}" onclick="selectPreset('${p.id}')">
      <div class="preset-item-led"></div>
      <span class="preset-item-name" title="${esc(p.name)}">${esc(p.name)}</span>
    </div>`;
  }).join('');
  const form = showingCreateForm ? `<div class="create-preset-form">
    <input id="new-preset-name" class="create-input" placeholder="Preset name…"
      onkeydown="if(event.key==='Enter')confirmCreate();if(event.key==='Escape')cancelCreate()"/>
    <div class="create-btns">
      <button class="create-ok" onclick="confirmCreate()">Create</button>
      <button class="create-cancel" onclick="cancelCreate()">✕</button>
    </div>
  </div>` : '';
  list.innerHTML = (presets.size === 0 && !showingCreateForm)
    ? `<div class="preset-detail-empty" style="padding:20px 0">no presets</div>${form}`
    : items + form;
}

function renderPresetDetail() {
  const el = document.getElementById('preset-detail'); if (!el) return;
  if (!selectedPresetId || !presets.has(selectedPresetId)) {
    el.innerHTML = '<div class="preset-detail-empty">select a preset</div>'; return;
  }
  const p = presets.get(selectedPresetId);
  const active = isPresetActive(p);
  const { routed, free } = getRoutedStreams(selectedPresetId);

  const CH_OPTS = ['Stereo','Mono','Surround51','Surround71'];
  const CH_LABELS = { Stereo:'Stereo', Mono:'Mono', Surround51:'5.1 Surround', Surround71:'7.1 Surround' };
  const curCh = p.channels ?? 'Stereo';
  const chOpts = CH_OPTS.map(v => `<option value="${v}"${v===curCh?' selected':''}>${CH_LABELS[v]}</option>`).join('');

  const header = `<div class="pd-header">
    <input class="pd-name" value="${esc(p.name)}"
      onblur="if(this.value.trim()&&this.value.trim()!=='${esc(p.name)}')renamePreset('${p.id}',this.value.trim())"
      onkeydown="if(event.key==='Enter')this.blur()"/>
    <select class="pd-ch-sel" title="Channel layout" onchange="setPresetChannels('${p.id}',this.value)">${chOpts}</select>
    ${active
      ? `<button class="pd-btn pd-btn-deactivate" onclick="deactivatePreset('${p.id}')">Deactivate</button>`
      : `<button class="pd-btn pd-btn-activate"   onclick="activatePreset('${p.id}')">Activate</button>`
    }
    <button class="pd-btn pd-btn-delete" onclick="deletePreset('${p.id}')">Delete</button>
  </div>`;

  const chain = p.chain || [];
  // Validate expansion against current chain length.
  if (typeof expandedChainIdx === 'number' && (expandedChainIdx < 0 || expandedChainIdx >= chain.length)) {
    expandedChainIdx = null;
  }
  const chainCards = chain.map((node, i) => {
    const k = node.kind?.type;
    let title, cls, hint = '';
    if (k === 'lv2') {
      const uri = node.kind.plugin_uri;
      const meta = lv2Catalog.get(uri);
      title = node.label || meta?.name || uri;
      cls = meta?.class ? `LV2 — ${meta.class}` : 'LV2 Plugin';
      hint = uri;
    } else if (k === 'ladspa') {
      const lkey = `${node.kind.path}::${node.kind.label}`;
      const meta = ladspaCatalog.get(lkey);
      title = node.label || meta?.name || node.kind.label;
      cls = 'LADSPA Plugin';
      hint = lkey;
    } else {
      title = node.label || node.kind?.label || '(unknown)';
      cls = 'Builtin';
    }
    const open = expandedChainIdx === i;
    return `<div class="chain-card${open?' open':''}${node.bypass?' bypassed':''}" id="chain-card-${i}">
      <div class="chain-hd" onclick="toggleChainExpand(${i})">
        <span class="chain-caret">${open?'▾':'▸'}</span>
        <span class="chain-pos">${i+1}</span>
        <div class="chain-title">
          <div class="chain-name" title="${esc(hint)}">${esc(title)}</div>
          <div class="chain-class">${esc(cls)}</div>
        </div>
        <button class="chain-btn" title="Move up"   onclick="event.stopPropagation();moveChainNode('${p.id}',${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="chain-btn" title="Move down" onclick="event.stopPropagation();moveChainNode('${p.id}',${i},1)"  ${i===chain.length-1?'disabled':''}>▼</button>
        <label class="chain-bypass" title="Bypass" onclick="event.stopPropagation()">
          <input type="checkbox" ${node.bypass?'checked':''}
            onclick="event.stopPropagation()"
            onchange="toggleChainBypass('${p.id}',${i},this.checked); document.getElementById('chain-card-${i}').classList.toggle('bypassed',this.checked)"/> bypass
        </label>
        <button class="chain-btn chain-btn-del" title="Remove" onclick="event.stopPropagation();removeChainNode('${p.id}',${i})">×</button>
      </div>
      ${open ? `<div class="chain-body" id="chain-body-${i}"><div class="chain-loading">loading…</div></div>` : ''}
    </div>`;
  }).join('');

  const chainSection = `<div class="pd-section">
    <div class="pd-section-hd">Effect chain (${chain.length})</div>
    <div class="pd-section-body">
      ${chainCards || '<div style="color:var(--text-30);font-size:10px;padding:2px 0">No effects — add a plugin below</div>'}
      <div class="sink-picker-row">
        <button class="add-out-btn" onclick="openPluginPicker('${p.id}')">+ Add plugin</button>
      </div>
    </div>
  </div>`;

  const outRows = p.outputs.map((o, i) => {
    const loopN = loopbackNodeForOutput(p.id, o.node_name);
    const live = loopN && loopN.volume != null;
    if (live) {
      // Mirror the Mixer view: live wpctl on the loopback node + mute toggle.
      const vol = loopN.volume ?? 1.0;
      const pct = Math.round(vol * 100);
      const muted = loopN.mute ?? false;
      return `<div class="output-row">
        <input class="out-name" value="${esc(o.node_name)}" readonly title="${esc(o.node_name)}"/>
        <div class="vol-wrap">
          <input class="vol-slider" id="mvs-${loopN.id}" type="range" min="0" max="1.5" step="0.01" value="${vol}"
            oninput="onMixVolChange(${loopN.id},this.value,this)"/>
          <input class="vol-pct" id="mvp-${loopN.id}" type="text" value="${pct}%"
            onfocus="this.select()" onkeydown="if(event.key==='Enter')this.blur()"
            onchange="applyPctInput(this, document.getElementById('mvs-${loopN.id}'))"/>
        </div>
        <button class="mute-btn${muted?' muted':''}" onclick="toggleNodeMute(${loopN.id})"
          title="${muted?'Unmute':'Mute'}">${muted?'M!':'M'}</button>
        <button class="rm-btn" onclick="removeOutput('${p.id}',${i})" title="Remove">×</button>
      </div>`;
    }
    // Inactive preset: edit the persisted volume that seeds the next apply.
    const pct = Math.round((o.volume ?? 1.0) * 100);
    const sliderId = `out-sl-${p.id}-${i}`;
    const pctId = `out-pct-${p.id}-${i}`;
    return `<div class="output-row">
      <input class="out-name" value="${esc(o.node_name)}" readonly title="${esc(o.node_name)}"/>
      <div class="vol-wrap">
        <input class="vol-slider" id="${sliderId}" type="range" min="0" max="1" step="0.01" value="${o.volume}"
          oninput="onVolumeChange('${p.id}',${i},this.value)"/>
        <input class="vol-pct" id="${pctId}" type="text" value="${pct}%"
          onfocus="this.select()" onkeydown="if(event.key==='Enter')this.blur()"
          onchange="applyPctInput(this, document.getElementById('${sliderId}'))"/>
      </div>
      <button class="mute-btn" disabled title="Activate preset to enable">M</button>
      <button class="rm-btn" onclick="removeOutput('${p.id}',${i})" title="Remove">×</button>
    </div>`;
  }).join('');

  const alreadyAdded = new Set(p.outputs.map(o => o.node_name));

  // Physical sinks only — exclude all pw-ctrl.* nodes
  const physicalSinks = [...nodes.values()]
    .filter(n => n.media_class === 'Audio/Sink'
      && !n.node_name?.startsWith('pw-ctrl.')
      && !alreadyAdded.has(n.node_name))
    .sort((a, b) => displayName(a).localeCompare(displayName(b)));

  // Virtual mic mixes by convention: pw-ctrl.vmic.{id}.mix
  // Derived from state, not from live nodes — works even if mic is not active yet.
  const vmicMixes = [...virtualMics.values()]
    .filter(m => {
      const mixName = `pw-ctrl.vmic.${m.id}.mix`;
      return !alreadyAdded.has(mixName);
    });

  function sinkOption(n) {
    const sk = stateKey(n.state);
    const dot = sk === 'Running' ? '● ' : sk === 'Idle' ? '◌ ' : '○ ';
    const cls = sk === 'Running' ? ' class="running"' : sk === 'Idle' ? ' class="idle"' : '';
    return `<option value="${esc(n.node_name??'')}"${cls}>${dot}${esc(displayName(n))}</option>`;
  }
  function vmicOption(m) {
    const mixName = `pw-ctrl.vmic.${m.id}.mix`;
    return `<option value="${esc(mixName)}">○ ${esc(m.name)}</option>`;
  }

  const hasPicker = physicalSinks.length > 0 || vmicMixes.length > 0;
  const pickerHTML = hasPicker
    ? `<div class="sink-picker-row">
        <select id="sink-pick-${p.id}" class="sink-select">
          ${physicalSinks.length ? `<optgroup label="Physical Sinks">${physicalSinks.map(sinkOption).join('')}</optgroup>` : ''}
          ${vmicMixes.length ? `<optgroup label="Virtual Mic Mixers">${vmicMixes.map(vmicOption).join('')}</optgroup>` : ''}
        </select>
        <button class="add-out-btn" onclick="addOutput('${p.id}')">+ Add</button>
      </div>`
    : `<div style="color:var(--text-30);font-size:10px;margin-top:8px">No sinks available to add</div>`;

  const outSection = `<div class="pd-section">
    <div class="pd-section-hd">Outputs (${p.outputs.length})</div>
    <div class="pd-section-body">
      ${outRows || '<div style="color:var(--text-30);font-size:10px;padding:2px 0">No outputs — pick a sink below</div>'}
      ${pickerHTML}
    </div>
  </div>`;

  function streamVolHTML(s) {
    if (s.volume == null) return '';
    const vol = s.volume ?? 1.0;
    const pct = Math.round(vol * 100);
    const muted = s.mute ?? false;
    return `<input class="vol-slider" id="mvs-${s.id}" type="range" min="0" max="1.5" step="0.01" value="${vol}"
        oninput="onMixVolChange(${s.id},this.value,this)"/>
      <input class="vol-pct" id="mvp-${s.id}" type="text" value="${pct}%"
        onfocus="this.select()" onkeydown="if(event.key==='Enter')this.blur()"
        onchange="applyPctInput(this, document.getElementById('mvs-${s.id}'))"/>
      <button class="mute-btn${muted?' muted':''}" onclick="toggleNodeMute(${s.id})"
        title="${muted?'Unmute':'Mute'}">${muted?'M!':'M'}</button>`;
  }
  const routedRows = routed.map(s => `<div class="route-row">
    <div class="playing-led" style="background:var(--green);box-shadow:0 0 4px var(--green)"></div>
    <span class="route-name" title="${esc(displayName(s))}">${esc(displayName(s))}</span>
    ${s.application_name ? `<span class="route-app">${esc(s.application_name)}</span>` : ''}
    ${streamVolHTML(s)}
    <button class="route-btn route-btn-unroute" onclick="unrouteStream('${p.id}',${s.id})">Unroute</button>
  </div>`).join('');
  const freeRows = free.map(s => `<div class="route-row">
    <div class="playing-led" style="background:var(--slate)"></div>
    <span class="route-name" title="${esc(displayName(s))}">${esc(displayName(s))}</span>
    ${s.application_name ? `<span class="route-app">${esc(s.application_name)}</span>` : ''}
    ${streamVolHTML(s)}
    <button class="route-btn route-btn-route" onclick="routeStream('${p.id}',${s.id})">Route here</button>
  </div>`).join('');

  const routeSection = `<div class="pd-section">
    <div class="pd-section-hd">Stream Routing</div>
    <div class="pd-section-body">
      ${(routedRows + freeRows) || '<div style="color:var(--text-30);font-size:10px;padding:2px 0">No playback streams active</div>'}
    </div>
  </div>`;

  // Source inputs section — native Audio/Source nodes fed into the EQ
  const alreadySrc = new Set(p.source_inputs ?? []);
  const srcRows = (p.source_inputs ?? []).map((name, i) => {
    const n = [...nodes.values()].find(x => x.node_name === name);
    const label = n ? displayName(n) : name;
    return `<div class="route-row">
      <div class="playing-led" style="background:var(--green);box-shadow:0 0 4px var(--green)"></div>
      <span class="route-name" title="${esc(name)}">${esc(label)}</span>
      <button class="route-btn route-btn-unroute" onclick="removeSourceInput('${p.id}',${i})">Remove</button>
    </div>`;
  }).join('');

  const availableSrcs = [...nodes.values()]
    .filter(n => n.media_class === 'Audio/Source'
      && !n.node_name?.startsWith('pw-ctrl.')
      && !alreadySrc.has(n.node_name))
    .sort((a, b) => displayName(a).localeCompare(displayName(b)));

  const srcPickerHTML = availableSrcs.length > 0
    ? `<div class="sink-picker-row">
        <select id="src-pick-${p.id}" class="sink-select">
          <optgroup label="Sources">${availableSrcs.map(n => {
            const sk = stateKey(n.state);
            const dot = sk === 'Running' ? '● ' : sk === 'Idle' ? '◌ ' : '○ ';
            return `<option value="${esc(n.node_name??'')}">${dot}${esc(displayName(n))}</option>`;
          }).join('')}</optgroup>
        </select>
        <button class="add-out-btn" onclick="addSourceInput('${p.id}')">+ Add</button>
      </div>`
    : `<div style="color:var(--text-30);font-size:10px;margin-top:8px">No native sources available</div>`;

  const srcSection = `<div class="pd-section">
    <div class="pd-section-hd">Source Inputs (${(p.source_inputs??[]).length})</div>
    <div class="pd-section-body">
      ${srcRows || '<div style="color:var(--text-30);font-size:10px;padding:2px 0">No sources — audio from apps only</div>'}
      ${srcPickerHTML}
    </div>
  </div>`;

  el.innerHTML = header + chainSection + outSection + srcSection + routeSection;
  // Only render the body of the expanded node — others stay collapsed.
  if (typeof expandedChainIdx === 'number' && chain[expandedChainIdx]) {
    renderChainNodeBody(p.id, expandedChainIdx, chain[expandedChainIdx]);
  }
}

// ── Chain card body renderer ──────────────────────────────────────────────────

async function renderChainNodeBody(presetId, idx, node) {
  const host = document.getElementById(`chain-body-${idx}`);
  if (!host) return;
  if (node.kind?.type === 'ladspa') {
    const key = `${node.kind.path}::${node.kind.label}`;
    let plugin;
    try { plugin = await getLadspaPlugin(key); }
    catch { host.innerHTML = `<div class="chain-error">plugin not found in catalog</div>`; return; }
    if (!plugin) { host.innerHTML = `<div class="chain-error">plugin not found in catalog</div>`; return; }
    renderGenericLadspa(host, plugin, node.kind.controls || {},
      (sym, val) => onChainControl(presetId, idx, sym, val));
    return;
  }
  if (node.kind?.type !== 'lv2') {
    host.innerHTML = `<div class="chain-empty">Builtin: ${esc(node.kind?.label || '?')}</div>`;
    return;
  }
  const uri = node.kind.plugin_uri;
  let plugin;
  try { plugin = await getLv2Plugin(uri); }
  catch (e) { host.innerHTML = `<div class="chain-error">plugin not found in catalog</div>`; return; }
  if (!plugin) { host.innerHTML = `<div class="chain-error">plugin not found in catalog</div>`; return; }

  // Try custom UI first.
  let ui = lv2CustomUI.get(uri);
  if (!ui) {
    try { ui = await apiFetch('GET', `/lv2/ui/${encodeURIComponent(uri)}`); lv2CustomUI.set(uri, ui); }
    catch { ui = { exists: false }; }
  }
  if (ui.exists) {
    try {
      const mod = await import(ui.path);
      const onChange = (sym, val) => onChainControl(presetId, idx, sym, val);
      host.innerHTML = '';
      mod.render(host, plugin, node.kind.controls || {}, onChange);
      return;
    } catch (e) {
      console.warn(`custom UI for ${uri} failed, falling back to generic:`, e);
    }
  }
  renderGenericLv2(host, plugin, node.kind.controls || {},
    (sym, val) => onChainControl(presetId, idx, sym, val));
}

function renderGenericLv2(host, plugin, controls, onChange) {
  const inputs = (plugin.ports || []).filter(p =>
    p.kind === 'Control' && p.direction === 'Input' &&
    !p.flags?.hidden &&
    p.designation !== 'http://lv2plug.in/ns/lv2core#enabled');
  if (inputs.length === 0) {
    host.innerHTML = `<div class="chain-empty">no controls</div>`;
    return;
  }
  const rows = inputs.map(port => {
    const sym = port.symbol;
    const cur = (sym in controls) ? controls[sym] : (port.default ?? port.min ?? 0);
    const min = port.min ?? 0, max = port.max ?? 1;
    let widget;
    if (port.flags?.toggled) {
      widget = `<input type="checkbox" ${cur >= 0.5 ? 'checked' : ''}
        onchange="onChainControl('${plugin.uri.replace(/'/g,"&#39;")}'
          ,0,'${sym}',this.checked?1:0)" data-sym="${esc(sym)}"/>`;
      // Replace with proper presetId/idx via dataset (filled below).
    } else if (port.scale_points && port.scale_points.length > 0) {
      const opts = port.scale_points.map(([v, l]) =>
        `<option value="${v}"${Math.abs(v - cur) < 1e-6 ? ' selected' : ''}>${esc(l)}</option>`).join('');
      widget = `<select class="lv2-sel" data-sym="${esc(sym)}">${opts}</select>`;
    } else if (port.flags?.integer) {
      widget = `<input type="number" class="lv2-num" min="${min}" max="${max}" step="1"
        value="${Math.round(cur)}" data-sym="${esc(sym)}"/>`;
    } else {
      const isLog = !!port.flags?.logarithmic;
      const safeMin = isLog ? Math.max(min, 1e-6) : min;
      const safeMax = Math.max(max, safeMin + 1e-6);
      const t = isLog
        ? (Math.log(Math.max(cur, safeMin)) - Math.log(safeMin)) / (Math.log(safeMax) - Math.log(safeMin))
        : (cur - min) / (max - min);
      widget = `<div class="lv2-slider-wrap">
        <input type="range" class="lv2-slider" min="0" max="1000" step="1"
          value="${Math.round(Math.max(0, Math.min(1, t)) * 1000)}"
          data-sym="${esc(sym)}" data-min="${min}" data-max="${max}" data-log="${isLog?1:0}"/>
        <span class="lv2-val" data-val-for="${esc(sym)}">${formatVal(cur)}</span>
      </div>`;
    }
    return `<div class="lv2-row" title="${esc(sym)}">
      <span class="lv2-label">${esc(port.name || sym)}</span>${widget}</div>`;
  }).join('');
  host.innerHTML = `<div class="lv2-grid">${rows}</div>`;

  // Wire up listeners (using delegation via dataset rather than inline handlers
  // so we don't need to interpolate presetId/idx into every widget string).
  host.querySelectorAll('[data-sym]').forEach(el => {
    const sym = el.dataset.sym;
    const handler = () => {
      let v;
      if (el.type === 'checkbox') v = el.checked ? 1 : 0;
      else if (el.tagName === 'SELECT') v = parseFloat(el.value);
      else if (el.classList.contains('lv2-slider')) {
        const t = parseFloat(el.value) / 1000;
        const mn = parseFloat(el.dataset.min), mx = parseFloat(el.dataset.max);
        const isLog = el.dataset.log === '1';
        const safeMin = isLog ? Math.max(mn, 1e-6) : mn;
        v = isLog ? Math.exp(Math.log(safeMin) + t * (Math.log(mx) - Math.log(safeMin)))
                  : mn + t * (mx - mn);
        const valEl = host.querySelector(`[data-val-for="${CSS.escape(sym)}"]`);
        if (valEl) valEl.textContent = formatVal(v);
      } else v = parseFloat(el.value);
      onChange(sym, v);
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
}

function renderGenericLadspa(host, plugin, controls, onChange) {
  const inputs = (plugin.ports || []).filter(p =>
    p.kind === 'Control' && p.direction === 'Input');
  if (inputs.length === 0) {
    host.innerHTML = `<div class="chain-empty">no controls</div>`;
    return;
  }
  // LADSPA uses port `name` as the symbol (case-sensitive).
  const rows = inputs.map(port => {
    const sym = port.name;
    const cur = (sym in controls) ? controls[sym] : (port.default ?? port.min ?? 0);
    const min = port.min ?? 0;
    const max = port.max ?? Math.max((port.default ?? 1) * 2, 1);
    let widget;
    if (port.flags?.toggled) {
      widget = `<input type="checkbox" ${cur >= 0.5 ? 'checked' : ''} data-sym="${esc(sym)}"/>`;
    } else if (port.flags?.integer) {
      widget = `<input type="number" class="lv2-num" min="${min}" max="${max}" step="1"
        value="${Math.round(cur)}" data-sym="${esc(sym)}"/>`;
    } else {
      const isLog = !!port.flags?.logarithmic;
      const safeMin = isLog ? Math.max(min, 1e-6) : min;
      const safeMax = Math.max(max, safeMin + 1e-6);
      const t = isLog
        ? (Math.log(Math.max(cur, safeMin)) - Math.log(safeMin)) / (Math.log(safeMax) - Math.log(safeMin))
        : (cur - min) / (max - min);
      widget = `<div class="lv2-slider-wrap">
        <input type="range" class="lv2-slider" min="0" max="1000" step="1"
          value="${Math.round(Math.max(0, Math.min(1, t)) * 1000)}"
          data-sym="${esc(sym)}" data-min="${min}" data-max="${max}" data-log="${isLog?1:0}"/>
        <span class="lv2-val" data-val-for="${esc(sym)}">${formatVal(cur)}</span>
      </div>`;
    }
    return `<div class="lv2-row" title="${esc(sym)}">
      <span class="lv2-label">${esc(port.name)}</span>${widget}</div>`;
  }).join('');
  host.innerHTML = `<div class="lv2-grid">${rows}</div>`;

  // Reuse the same listener wiring as the LV2 renderer.
  host.querySelectorAll('[data-sym]').forEach(el => {
    const sym = el.dataset.sym;
    const handler = () => {
      let v;
      if (el.type === 'checkbox') v = el.checked ? 1 : 0;
      else if (el.classList.contains('lv2-slider')) {
        const t = parseFloat(el.value) / 1000;
        const mn = parseFloat(el.dataset.min), mx = parseFloat(el.dataset.max);
        const isLog = el.dataset.log === '1';
        const safeMin = isLog ? Math.max(mn, 1e-6) : mn;
        v = isLog ? Math.exp(Math.log(safeMin) + t * (Math.log(mx) - Math.log(safeMin)))
                  : mn + t * (mx - mn);
        const valEl = host.querySelector(`[data-val-for="${CSS.escape(sym)}"]`);
        if (valEl) valEl.textContent = formatVal(v);
      } else v = parseFloat(el.value);
      onChange(sym, v);
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
}

function formatVal(v) {
  if (!Number.isFinite(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1000) return v.toFixed(0);
  if (a >= 10)   return v.toFixed(1);
  if (a >= 1)    return v.toFixed(2);
  return v.toFixed(3);
}

// ── Virtual Mics state ────────────────────────────────────────────────────────
const virtualMics = new Map();
let selectedMicId       = null;
let showingMicCreateForm = false;
let micGainDebounce     = null;

function isMicActive(mic) {
  const target = `pw-ctrl.vmic.${mic.id}`;
  for (const n of nodes.values()) { if (n.node_name === target) return true; }
  return false;
}

// ── Virtual Mic API ───────────────────────────────────────────────────────────
async function fetchVirtualMics() {
  try {
    const list = await apiFetch('GET', '/virtual-mics');
    virtualMics.clear();
    for (const m of list) virtualMics.set(m.id, m);
    renderMicList();
    if (selectedMicId && !virtualMics.has(selectedMicId)) selectedMicId = null;
    renderMicDetail();
    renderPresetDetail(); // output picker may need vmic mixes
  } catch(e) { console.error('fetchVirtualMics', e); }
}

window.toggleMicCreateForm = function() {
  showingMicCreateForm = !showingMicCreateForm;
  renderMicList();
  if (showingMicCreateForm) setTimeout(() => document.getElementById('new-mic-name')?.focus(), 50);
};
window.cancelMicCreate = function() { showingMicCreateForm = false; renderMicList(); };
window.confirmMicCreate = async function() {
  const inp = document.getElementById('new-mic-name');
  const name = inp?.value.trim(); if (!name) return;
  try {
    const m = await apiFetch('POST', '/virtual-mics', { name });
    virtualMics.set(m.id, m);
    showingMicCreateForm = false;
    selectedMicId = m.id;
    renderMicList(); renderMicDetail();
  } catch(e) { console.error('createVirtualMic', e); }
};

window.selectMic = function(id) { selectedMicId = id; renderMicList(); renderMicDetail(); syncHash(); };

window.deleteMic = async function(id) {
  if (!confirm(`Delete virtual mic "${virtualMics.get(id)?.name}"?`)) return;
  try {
    await apiFetch('DELETE', `/virtual-mics/${id}`);
    virtualMics.delete(id);
    if (selectedMicId === id) selectedMicId = null;
    renderMicList(); renderMicDetail();
  } catch(e) { console.error('deleteMic', e); }
};

window.activateVirtualMic = async function(id) {
  try { await apiFetch('POST', `/virtual-mics/${id}/activate`); }
  catch(e) { console.error('activateVirtualMic', e); }
};
window.deactivateVirtualMic = async function(id) {
  try {
    await apiFetch('POST', `/virtual-mics/${id}/deactivate`);
    setTimeout(() => { if (currentTab === 'mics') { renderMicList(); renderMicDetail(); } }, 350);
  } catch(e) { console.error('deactivateVirtualMic', e); }
};
function makeMicId(name) {
  return (name || '').toLowerCase()
    .split('').map(c => /[a-z0-9]/.test(c) ? c : '-').join('')
    .replace(/^-+|-+$/g, '');
}

window.remapMic = async function(id) {
  const m = virtualMics.get(id);
  if (!m) return;
  const newId = makeMicId(m.name);
  if (!newId || newId === id) return;
  if (!confirm(`Remap id "${id}" → "${newId}"?\n\nAll preset references will be rewritten. External apps connected to the old node name will lose their connection — apply changes afterwards to recreate nodes.`)) return;
  try {
    const res = await apiFetch('POST', `/virtual-mics/${id}/remap`);
    if (res && res.id) {
      const mic = virtualMics.get(id);
      virtualMics.delete(id);
      if (mic) { mic.id = res.id; virtualMics.set(res.id, mic); }
      if (selectedMicId === id) selectedMicId = res.id;
      // Presets may have been rewritten too.
      await fetchPresets();
      renderMicList(); renderMicDetail(); renderPresetDetail();
    }
  } catch(e) { console.error('remapMic', e); alert('Remap failed: ' + e.message); }
};

window.renameMic = async function(id, newName) {
  try {
    await apiFetch('PUT', `/virtual-mics/${id}`, { name: newName });
    const m = virtualMics.get(id); if (m) m.name = newName;
    renderMicList();
  } catch(e) { console.error('renameMic', e); }
};

window.addMicInput = async function(micId) {
  const sel = document.getElementById(`src-pick-${micId}`);
  const nodeName = sel?.value; if (!nodeName) return;
  try {
    await apiFetch('POST', `/virtual-mics/${micId}/inputs`, { node_name: nodeName, gain: 1.0 });
    const updated = await apiFetch('GET', `/virtual-mics/${micId}`);
    virtualMics.set(micId, updated); renderMicDetail();
  } catch(e) { console.error('addMicInput', e); }
};
window.removeMicInput = async function(micId, idx) {
  try {
    await apiFetch('DELETE', `/virtual-mics/${micId}/inputs/${idx}`);
    const updated = await apiFetch('GET', `/virtual-mics/${micId}`);
    virtualMics.set(micId, updated); renderMicDetail();
  } catch(e) { console.error('removeMicInput', e); }
};
window.onMicGainChange = function(micId, idx, val) {
  const v = parseFloat(val);
  const el = document.getElementById(`mic-gain-val-${micId}-${idx}`);
  if (el) el.value = Math.round(v * 100) + '%';
  clearTimeout(window[`_mgT_${idx}`]);
  window[`_mgT_${idx}`] = setTimeout(async () => {
    try {
      await apiFetch('PUT', `/virtual-mics/${micId}/inputs/${idx}`, { gain: v });
      const m = virtualMics.get(micId); if (m?.inputs[idx]) m.inputs[idx].gain = v;
    } catch(e) { console.error('updateMicGain', e); }
  }, 400);
};

// ── Virtual Mic renders ───────────────────────────────────────────────────────
function renderMicList() {
  const list = document.getElementById('mic-list'); if (!list) return;
  const items = [...virtualMics.values()].map(m => {
    const active = isMicActive(m), sel = m.id === selectedMicId;
    return `<div class="preset-item${active?' active':''}${sel?' selected':''}" onclick="selectMic('${m.id}')">
      <div class="preset-item-led"></div>
      <span class="preset-item-name" title="${esc(m.name)}">${esc(m.name)}</span>
    </div>`;
  }).join('');
  const form = showingMicCreateForm ? `<div class="create-preset-form">
    <input id="new-mic-name" class="create-input" placeholder="Mic name…"
      onkeydown="if(event.key==='Enter')confirmMicCreate();if(event.key==='Escape')cancelMicCreate()"/>
    <div class="create-btns">
      <button class="create-ok" onclick="confirmMicCreate()">Create</button>
      <button class="create-cancel" onclick="cancelMicCreate()">✕</button>
    </div>
  </div>` : '';
  list.innerHTML = (virtualMics.size === 0 && !showingMicCreateForm)
    ? `<div class="preset-detail-empty" style="padding:20px 0">no virtual mics</div>${form}`
    : items + form;
}

function renderMicDetail() {
  const el = document.getElementById('mic-detail'); if (!el) return;
  if (!selectedMicId || !virtualMics.has(selectedMicId)) {
    el.innerHTML = '<div class="preset-detail-empty">select a virtual mic</div>'; return;
  }
  const m = virtualMics.get(selectedMicId);
  const active = isMicActive(m);

  const vmicOutputNode = [...nodes.values()].find(n =>
    n.node_name === `pw-ctrl.vmic.${m.id}` && n.media_class === 'Audio/Source'
  ) ?? null;
  const vmicMuteBtn = active && vmicOutputNode
    ? `<button class="pd-btn ${vmicOutputNode.mute?'pd-btn-muted':'pd-btn-mute'}"
         onclick="toggleNodeMute(${vmicOutputNode.id})"
         title="${vmicOutputNode.mute?'Unmute mic':'Mute mic'}">${vmicOutputNode.mute?'Unmute':'Mute'}</button>`
    : '';

  const header = `<div class="pd-header">
    <input class="pd-name" value="${esc(m.name)}"
      onblur="if(this.value.trim()&&this.value.trim()!=='${esc(m.name)}')renameMic('${m.id}',this.value.trim())"
      onkeydown="if(event.key==='Enter')this.blur()"/>
    ${active
      ? `<button class="pd-btn pd-btn-deactivate" onclick="deactivateVirtualMic('${m.id}')">Deactivate</button>`
      : `<button class="pd-btn pd-btn-activate"   onclick="activateVirtualMic('${m.id}')">Activate</button>`
    }
    ${vmicMuteBtn}
    ${makeMicId(m.name) && makeMicId(m.name) !== m.id
      ? `<button class="pd-btn" onclick="remapMic('${m.id}')" title="Rename node ids to match the current name (id: ${esc(m.id)} → ${esc(makeMicId(m.name))}). Apply changes afterwards.">Remap id</button>`
      : ''}
    <button class="pd-btn pd-btn-delete" onclick="deleteMic('${m.id}')">Delete</button>
  </div>`;

  // Input rows (gain slider goes to 2.0 = 200% for mic boost)
  const inputRows = m.inputs.map((inp, i) => {
    const pct = Math.round(inp.gain * 100);
    return `<div class="output-row">
      <input class="out-name" value="${esc(inp.node_name)}" readonly title="${esc(inp.node_name)}"/>
      <div class="vol-wrap">
        <input class="vol-slider" id="mic-gain-sl-${m.id}-${i}" type="range" min="0" max="2" step="0.01" value="${inp.gain}"
          oninput="onMicGainChange('${m.id}',${i},this.value)"/>
        <input class="vol-pct" id="mic-gain-val-${m.id}-${i}" type="text" value="${pct}%"
          onfocus="this.select()" onkeydown="if(event.key==='Enter')this.blur()"
          onchange="applyPctInput(this, document.getElementById('mic-gain-sl-${m.id}-${i}'))"/>
      </div>
      <button class="rm-btn" onclick="removeMicInput('${m.id}',${i})" title="Remove">×</button>
    </div>`;
  }).join('');

  // Source picker: real mics and sink monitors, excluding already-added
  const alreadyAdded = new Set(m.inputs.map(i => i.node_name));

  const realMics = [...nodes.values()]
    .filter(n => n.media_class === 'Audio/Source'
      && !n.node_name?.endsWith('.monitor')
      && !n.node_name?.startsWith('pw-ctrl.')
      && !alreadyAdded.has(n.node_name))
    .sort((a, b) => displayName(a).localeCompare(displayName(b)));

  const monitors = [...nodes.values()]
    .filter(n => n.media_class === 'Audio/Source'
      && n.node_name?.endsWith('.monitor')
      && !alreadyAdded.has(n.node_name))
    .sort((a, b) => displayName(a).localeCompare(displayName(b)));

  function srcOption(n) {
    const sk = stateKey(n.state);
    const dot = sk === 'Running' ? '● ' : sk === 'Idle' ? '◌ ' : '○ ';
    const cls = sk === 'Running' ? ' class="running"' : sk === 'Idle' ? ' class="idle"' : '';
    return `<option value="${esc(n.node_name??'')}"${cls}>${dot}${esc(displayName(n))}</option>`;
  }

  const hasSrc = realMics.length > 0 || monitors.length > 0;
  const pickerHTML = hasSrc
    ? `<div class="sink-picker-row">
        <select id="src-pick-${m.id}" class="sink-select">
          ${realMics.length ? `<optgroup label="Microphones">${realMics.map(srcOption).join('')}</optgroup>` : ''}
          ${monitors.length ? `<optgroup label="Monitors (Loopback)">${monitors.map(srcOption).join('')}</optgroup>` : ''}
        </select>
        <button class="add-out-btn" onclick="addMicInput('${m.id}')">+ Add</button>
      </div>`
    : `<div style="color:var(--text-30);font-size:10px;margin-top:8px">No sources available</div>`;

  const inputsSection = `<div class="pd-section">
    <div class="pd-section-hd">Input Sources (${m.inputs.length})</div>
    <div class="pd-section-body">
      ${inputRows || '<div style="color:var(--text-30);font-size:10px;padding:2px 0">No inputs — add a source below</div>'}
      ${pickerHTML}
    </div>
  </div>`;

  // Info note about how to use in apps
  const nodeTarget = VirtualMicFilter_nodeName(m.id);
  const statusNote = active
    ? `<div style="font-size:10px;color:var(--text-60);padding:8px 2px;line-height:1.6">
        Node name: <span style="color:var(--teal);font-family:var(--font-mono)">${esc(nodeTarget)}</span><br>
        Select <strong style="color:var(--text-100)">${esc(m.name)}</strong> as the microphone input in any app.
      </div>`
    : `<div style="font-size:10px;color:var(--text-30);padding:8px 2px">Activate to register the virtual mic in PipeWire.</div>`;

  el.innerHTML = header + inputsSection + statusNote;
}

function VirtualMicFilter_nodeName(id) { return `pw-ctrl.vmic.${id}`; }

let mixerRafPending = false;
function scheduleMixerRender() {
  if (mixerRafPending) return;
  mixerRafPending = true;
  requestAnimationFrame(() => { mixerRafPending = false; renderMixer(); });
}

function safeNodeName(n) {
  return n.replace(/[^a-zA-Z0-9-]/g, '_').replace(/^_+|_+$/g, '');
}

function loopbackNodeForOutput(presetId, outputNodeName) {
  let expectedName;
  if (outputNodeName.startsWith('pw-ctrl.vmic.')) {
    const vmicId = outputNodeName.replace('pw-ctrl.vmic.', '').replace('.mix', '');
    expectedName = `pw-ctrl.preset.${presetId}.loopback.vmic.${safeNodeName(vmicId)}`;
  } else {
    expectedName = `pw-ctrl.preset.${presetId}.loopback.sink.${safeNodeName(outputNodeName)}`;
  }
  return [...nodes.values()].find(n => n.node_name === expectedName) ?? null;
}

async function toggleNodeMute(nodeId) {
  await apiFetch('POST', `/nodes/${nodeId}/mute`);
}

/// Parse a percentage typed into a vol-pct input, clamp it, push the resulting
/// value into the bound slider, and trigger its `input` event so the existing
/// debounced handler runs.
window.applyPctInput = function(input, slider) {
  if (!slider) return;
  const raw = String(input.value).replace(/[^0-9.]/g, '');
  let pct = parseFloat(raw);
  if (!isFinite(pct)) {
    input.value = Math.round(parseFloat(slider.value) * 100) + '%';
    return;
  }
  const max = parseFloat(slider.max) || 1;
  let v = pct / 100;
  if (v < 0) v = 0;
  if (v > max) v = max;
  slider.value = v;
  input.value = Math.round(v * 100) + '%';
  slider.dispatchEvent(new Event('input', { bubbles: true }));
};

const mixVolTimers = new Map();
function onMixVolChange(nodeId, val, el) {
  const pct = Math.round(parseFloat(val) * 100);
  const pEl = document.getElementById(`mvp-${nodeId}`);
  if (pEl) {
    if ('value' in pEl) pEl.value = `${pct}%`;
    else pEl.textContent = `${pct}%`;
  }
  clearTimeout(mixVolTimers.get(nodeId));
  mixVolTimers.set(nodeId, setTimeout(() => apiFetch('POST', `/nodes/${nodeId}/volume`, { volume: parseFloat(val) }), 400));
}

function mixRowHTML(n, volMax = 1.5) {

      ? `<input class="vol-slider" id="mvs-${n.id}" type="range" min="0" max="${volMax}" step="0.01" value="${vol}"

    ${hasVol
      ? `<input class="vol-pct" id="mvp-${n.id}" type="text" value="${pct}%"

function renderMixer() {
  const el = document.getElementById('view-mixer');
  if (!el || currentTab !== 'mixer') return;

  const physSinks    = [];
  const physSources  = [];
  const loopbacks    = [];
  const vmicOut      = [];
  const other        = [];

  for (const n of nodes.values()) {
    const name = n.node_name ?? '';
    const hasMixInfo = n.volume != null || n.mute != null;
    if (!hasMixInfo) continue;

    if (n.media_class === 'Audio/Sink' && !name.startsWith('pw-ctrl.')) {
      physSinks.push(n);
    } else if (n.media_class === 'Audio/Source' && !name.startsWith('pw-ctrl.')) {
      physSources.push(n);
    } else if (
      name.startsWith('pw-ctrl.preset.') &&
      name.includes('.loopback.') &&
      !name.endsWith('.cap') &&
      n.media_class === 'Stream/Output/Audio'
    ) {
      loopbacks.push(n);
    } else if (
      name.startsWith('pw-ctrl.vmic.') &&
      n.media_class === 'Audio/Source' &&
      !name.endsWith('.mix')
    ) {
      vmicOut.push(n);
    } else if (!name.startsWith('pw-ctrl.')) {
      other.push(n);
    }
  }

  const byLabel = (a, b) => displayName(a).localeCompare(displayName(b));
  physSinks.sort(byLabel); physSources.sort(byLabel); vmicOut.sort(byLabel);

  // Group loopbacks by preset ID
  const loopByPreset = new Map();
  for (const n of loopbacks) {
    const part = n.node_name.split('.loopback.')[0];
    const pid  = part.replace('pw-ctrl.preset.', '');
    if (!loopByPreset.has(pid)) loopByPreset.set(pid, []);
    loopByPreset.get(pid).push(n);
  }

  function section(title, bodyHTML) {
    if (!bodyHTML) return '';
    return `<div class="mix-section">
      <div class="mix-section-hd">${title}</div>
      ${bodyHTML}
    </div>`;
  }

  const sinkHTML   = physSinks.map(n => mixRowHTML(n)).join('') || '<div class="mix-empty">none</div>';
  const sourceHTML = physSources.map(n => mixRowHTML(n)).join('') || '<div class="mix-empty">none</div>';

  let loopHTML = '';
  for (const [pid, pnodes] of loopByPreset) {
    const pname = presets.get(pid)?.name ?? pid;
    loopHTML += `<div class="mix-group-hd">${esc(pname)}</div>`;
    loopHTML += pnodes.map(n => mixRowHTML(n)).join('');
  }

  const vmicHTML = vmicOut.map(n => mixRowHTML(n)).join('') || '<div class="mix-empty">none</div>';
  const otherHTML = other.map(n => mixRowHTML(n)).join('');

  el.innerHTML =
    section('Physical Sinks',   sinkHTML) +
    section('Physical Sources',  sourceHTML) +
    (loopHTML ? section('Preset Outputs', loopHTML) : '') +
    section('Virtual Mics',     vmicHTML) +
    (otherHTML ? section('Other', otherHTML) : '');
}

// ── Init ──────────────────────────────────────────────────────────────────────
connect();
applyHash();  // restore tab + selection from URL on first load / F5

// ── Config preview / apply ────────────────────────────────────────────────────
let cfgData = null;
let cfgCurrentTab = 'pw';

async function configPreview() {
  const btn = document.getElementById('preview-btn');
  btn.classList.add('busy');
  btn.textContent = '…';
  try {
    const res = await fetch('/config/preview', { method: 'POST' });
    if (!res.ok) { alert('Preview failed: ' + await res.text()); return; }
    cfgData = await res.json();
    cfgCurrentTab = 'pw';
    openCfgModal();
  } catch(e) { alert('Preview error: ' + e); }
  finally { btn.classList.remove('busy'); btn.textContent = 'Preview'; }
}

async function configApply() {
  if (!confirm('Apply config and restart PipeWire/WirePlumber?\nAudio will be interrupted briefly.')) return;
  const btn = document.getElementById('cfg-apply-btn') || document.getElementById('apply-btn');
  btn.disabled = true;
  const prev = btn.textContent;
  btn.textContent = 'Applying…';
  try {
    const res = await fetch('/config/apply', { method: 'POST' });
    if (res.ok) {
      closeCfgModal();
      showToast('Config applied — PipeWire restarting');
    } else {
      alert('Apply failed: ' + await res.text());
    }
  } catch(e) { alert('Apply error: ' + e); }
  finally { btn.disabled = false; btn.textContent = prev; }
}

function openCfgModal() {
  renderCfgModal();
  document.getElementById('cfg-modal-backdrop').classList.add('open');
}

function closeCfgModal(e) {
  if (e && e.target !== document.getElementById('cfg-modal-backdrop')) return;
  document.getElementById('cfg-modal-backdrop').classList.remove('open');
}

function switchCfgTab(tab) {
  cfgCurrentTab = tab;
  document.getElementById('cfg-tab-pw').classList.toggle('active', tab === 'pw');
  document.getElementById('cfg-tab-wp').classList.toggle('active', tab === 'wp');
  renderCfgModal();
}

function renderCfgModal() {
  if (!cfgData) return;
  document.getElementById('cfg-pre').textContent =
    cfgCurrentTab === 'pw' ? cfgData.pipewire_conf : cfgData.wireplumber_conf;
  document.getElementById('cfg-path-pw').textContent = '→ ' + cfgData.pipewire_path;
  document.getElementById('cfg-path-wp').textContent = '→ ' + cfgData.wireplumber_path;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: 'var(--bg-2)', border: '1px solid var(--border-m)',
    color: 'var(--text-80)', padding: '9px 18px', borderRadius: '8px',
    fontSize: '12px', zIndex: '9999', boxShadow: '0 4px 24px rgba(0,0,0,.5)',
    transition: 'opacity .4s', pointerEvents: 'none',
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
}
// ── Soundboard ───────────────────────────────────────────────────────────────
let soundClips = [];
let soundTagCounts = [];
const activeFilterTags = new Set();
const activePlaybacks = new Map(); // playback_id → entry

function fmtDuration(ms) {
  if (!ms) return '—';
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r.toString().padStart(2,'0')}`;
}

async function fetchSounds() {
  try {
    const params = new URLSearchParams();
    if (activeFilterTags.size) params.set('tags', [...activeFilterTags].join(','));
    const q = (document.getElementById('sb-search')?.value || '').trim();
    if (q) params.set('q', q);
    const url = '/sounds' + (params.toString() ? '?' + params.toString() : '');
    const r = await fetch(url);
    soundClips = r.ok ? await r.json() : [];
    renderSounds();
  } catch (e) { console.error('fetchSounds', e); }
}

async function fetchSoundTags() {
  try {
    const r = await fetch('/sounds/tags');
    soundTagCounts = r.ok ? await r.json() : [];
    renderSoundTags();
  } catch (e) { console.error('fetchSoundTags', e); }
}

async function fetchPlaybacks() {
  try {
    const r = await fetch('/playbacks');
    if (!r.ok) return;
    const list = await r.json();
    activePlaybacks.clear();
    list.forEach(p => activePlaybacks.set(p.playback_id, p));
    renderActivePlaybacks();
  } catch (e) { console.error('fetchPlaybacks', e); }
}

// Selected target node_names. Empty = default sink. "" sentinel = explicit Default chip.
const selectedTargets = new Set(['']);

function refreshTargetOptions() {
  const row = document.getElementById('sb-target-chips');
  if (!row) return;
  const sinks = [...nodes.values()]
    .filter(n => n.media_class === 'Audio/Sink')
    .sort((a,b) => displayName(a).localeCompare(displayName(b)));
  const physical = sinks.filter(n => !(n.node_name||'').startsWith('pw-ctrl.'));
  // Only the user-facing preset sink (pw-ctrl.preset.{id}); skip internals like
  // .eq-mix / .eq-src / .eq-out which match the prefix but have extra dot segments.
  const presetSinks = sinks.filter(n => {
    const name = n.node_name || '';
    if (!name.startsWith('pw-ctrl.preset.')) return false;
    return !name.slice('pw-ctrl.preset.'.length).includes('.');
  });

  const chip = (val, label) => {
    const active = selectedTargets.has(val) ? 'active' : '';
    return `<span class="sb-target-chip ${active}" onclick="toggleTarget('${esc(val)}')">${esc(label)}</span>`;
  };

  const parts = [chip('', 'Default sink')];
  if (physical.length) {
    parts.push('<span class="sb-target-chip group">Physical</span>');
    physical.forEach(n => parts.push(chip(n.node_name||'', displayName(n))));
  }
  if (presetSinks.length) {
    parts.push('<span class="sb-target-chip group">Presets</span>');
    presetSinks.forEach(n => parts.push(chip(n.node_name||'', displayName(n))));
  }

  // Virtual mics: each vmic exposes a hidden Audio/Sink at pw-ctrl.vmic.{id}.mix
  // (the capture side of the loopback that drives the source). Sending a stream
  // there delivers audio straight into the vmic with no extra wiring needed.
  if (virtualMics && virtualMics.size) {
    parts.push('<span class="sb-target-chip group">Virtual Mics</span>');
    [...virtualMics.values()].forEach(m => {
      const mixName = `pw-ctrl.vmic.${m.id}.mix`;
      const active = selectedTargets.has(mixName) ? 'active' : '';
      parts.push(`<span class="sb-target-chip ${active}" title="Streams directly into the &quot;${esc(m.name)}&quot; virtual mic via ${esc(mixName)}" onclick="toggleTarget('${esc(mixName)}')">🎙 ${esc(m.name)}</span>`);
    });
  }
  row.innerHTML = parts.join('');
}

window.toggleTarget = function(val) {
  if (selectedTargets.has(val)) selectedTargets.delete(val);
  else selectedTargets.add(val);
  if (selectedTargets.size === 0) selectedTargets.add(''); // never empty
  refreshTargetOptions();
};

function renderSoundTags() {
  const row = document.getElementById('sb-tag-row');
  if (!row) return;
  if (!soundTagCounts.length) { row.innerHTML = '<span style="color:var(--text-60);font-size:11px">No tags yet</span>'; return; }
  row.innerHTML = soundTagCounts.map(({tag, count}) => {
    const active = activeFilterTags.has(tag) ? 'active' : '';
    return `<span class="sb-tag ${active}" onclick="toggleFilterTag('${esc(tag)}')">${esc(tag)}<span class="sb-tag-count">${count}</span></span>`;
  }).join('');
}

window.toggleFilterTag = function(tag) {
  if (activeFilterTags.has(tag)) activeFilterTags.delete(tag);
  else activeFilterTags.add(tag);
  renderSoundTags();
  fetchSounds();
};

function clipIsPlaying(clipId) {
  for (const p of activePlaybacks.values()) if (p.clip_id === clipId) return true;
  return false;
}

function renderSounds() {
  const grid = document.getElementById('sb-grid');
  if (!grid) return;
  if (!soundClips.length) {
    grid.innerHTML = '<div style="color:var(--text-60);font-size:13px;grid-column:1/-1;text-align:center;padding:40px">No clips. Upload one or paste a YouTube URL.</div>';
    return;
  }
  grid.innerHTML = soundClips.map(c => {
    const playing = clipIsPlaying(c.id) ? 'playing' : '';
    const tagsHtml = (c.tags||[]).map(t => `<span class="sb-card-tag">${esc(t)}</span>`).join('');
    return `
      <div class="sb-card ${playing}">
        <div class="sb-card-name" title="${esc(c.name)}">${esc(c.name)}</div>
        <div class="sb-card-meta"><span>${fmtDuration(c.duration_ms)}</span><span>${esc(c.file_name.split('.').pop())}</span></div>
        <div class="sb-card-tags">${tagsHtml}</div>
        <button class="sb-card-play" onclick="playSound('${c.id}')">▶ Play</button>
        <div class="sb-card-actions">
          <button onclick="editSound('${c.id}')">Edit</button>
          <button onclick="deleteSound('${c.id}')">Delete</button>
        </div>
      </div>`;
  }).join('');
}

function renderActivePlaybacks() {
  const wrap = document.getElementById('sb-active');
  if (!wrap) return;
  if (!activePlaybacks.size) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
  wrap.style.display = '';
  const rows = [...activePlaybacks.values()].map(p => {
    const clip = soundClips.find(c => c.id === p.clip_id);
    const name = clip ? clip.name : p.clip_id;
    const target = p.target_node_name || '(default)';
    const vol = p.volume ?? 1.0;
    const lp = p.loop_mode ? 'on' : '';
    return `
      <div class="sb-active-row">
        <span class="sb-active-name">${esc(name)}</span>
        <span class="sb-active-target">${esc(target)}</span>
        <input class="sb-active-vol" id="pb-sl-${p.playback_id}" type="range" min="0" max="2" step="0.01" value="${vol}"
               oninput="setPbVolume('${p.playback_id}', this.value);document.getElementById('pb-pct-${p.playback_id}').value=Math.round(parseFloat(this.value)*100)+'%'">
        <input class="vol-pct" id="pb-pct-${p.playback_id}" type="text" value="${Math.round(vol*100)}%"
          onfocus="this.select()" onkeydown="if(event.key==='Enter')this.blur()"
          onchange="applyPctInput(this, document.getElementById('pb-sl-${p.playback_id}'))">
        <span class="sb-active-loop ${lp}" onclick="togglePbLoop('${p.playback_id}')">loop</span>
        <button class="sb-active-stop" onclick="stopPb('${p.playback_id}')">stop</button>
      </div>`;
  }).join('');
  wrap.innerHTML = rows;
}

window.toggleUploadPanel = function() {
  const p = document.getElementById('sb-upload-panel');
  p.style.display = p.style.display === 'none' ? '' : 'none';
};
window.toggleYoutubePanel = function() {
  const p = document.getElementById('sb-youtube-panel');
  p.style.display = p.style.display === 'none' ? '' : 'none';
};

window.uploadClip = async function() {
  const fileEl = document.getElementById('sb-upload-file');
  const status = document.getElementById('sb-upload-status');
  if (!fileEl.files.length) { status.textContent = 'Pick a file first'; status.className = 'sb-status error'; return; }
  const fd = new FormData();
  fd.append('file', fileEl.files[0]);
  const name = document.getElementById('sb-upload-name').value.trim();
  if (name) fd.append('name', name);
  const tags = document.getElementById('sb-upload-tags').value.trim();
  if (tags) fd.append('tags', tags);
  status.textContent = 'Uploading…'; status.className = 'sb-status';
  try {
    const r = await fetch('/sounds', { method: 'POST', body: fd });
    if (!r.ok) { status.textContent = 'Failed: ' + await r.text(); status.className = 'sb-status error'; return; }
    status.textContent = 'OK'; status.className = 'sb-status ok';
    fileEl.value = '';
    document.getElementById('sb-upload-name').value = '';
    document.getElementById('sb-upload-tags').value = '';
    fetchSounds(); fetchSoundTags();
  } catch (e) { status.textContent = String(e); status.className = 'sb-status error'; }
};

window.ingestYoutube = async function() {
  const url = document.getElementById('sb-yt-url').value.trim();
  const status = document.getElementById('sb-yt-status');
  if (!url) { status.textContent = 'Paste a URL'; status.className = 'sb-status error'; return; }
  const name = document.getElementById('sb-yt-name').value.trim() || null;
  const tags = document.getElementById('sb-yt-tags').value.trim()
    .split(',').map(s => s.trim()).filter(Boolean);
  status.textContent = 'Downloading… (this can take a while)'; status.className = 'sb-status';
  try {
    const r = await fetch('/sounds/youtube', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url, name, tags }),
    });
    if (!r.ok) { status.textContent = 'Failed: ' + await r.text(); status.className = 'sb-status error'; return; }
    status.textContent = 'OK'; status.className = 'sb-status ok';
    document.getElementById('sb-yt-url').value = '';
    document.getElementById('sb-yt-name').value = '';
    document.getElementById('sb-yt-tags').value = '';
    fetchSounds(); fetchSoundTags();
  } catch (e) { status.textContent = String(e); status.className = 'sb-status error'; }
};

function setPlayStatus(text, kind) {
  const el = document.getElementById('sb-play-status');
  if (!el) return;
  el.textContent = text || '';
  el.className = 'sb-status' + (kind ? ' ' + kind : '');
  if (text && kind === 'ok') {
    setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 2500);
  }
}

window.playSound = async function(clipId) {
  if (!selectedTargets.size) { setPlayStatus('Pick at least one target', 'error'); return; }
  const targets = [...selectedTargets].map(t => t === '' ? null : t);
  setPlayStatus('Starting…');
  const errors = [];
  await Promise.all(targets.map(async (t) => {
    try {
      const r = await fetch(`/sounds/${encodeURIComponent(clipId)}/play`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ target_node_name: t }),
      });
      if (!r.ok) errors.push(`${t || 'default'}: ${await r.text()}`);
    } catch (e) { errors.push(String(e)); }
  }));
  if (errors.length) setPlayStatus('Play failed — ' + errors.join(' | '), 'error');
  else setPlayStatus(`Playing on ${targets.length} target(s)`, 'ok');
};

window.stopPb = async function(pid) {
  await fetch(`/playbacks/${encodeURIComponent(pid)}/stop`, { method: 'POST' });
};
window.setPbVolume = async function(pid, v) {
  const entry = activePlaybacks.get(pid); if (entry) entry.volume = parseFloat(v);
  await fetch(`/playbacks/${encodeURIComponent(pid)}/volume`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ volume: parseFloat(v) }),
  });
};
window.togglePbLoop = async function(pid) {
  const entry = activePlaybacks.get(pid); if (!entry) return;
  entry.loop_mode = !entry.loop_mode;
  await fetch(`/playbacks/${encodeURIComponent(pid)}/loop`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ loop: entry.loop_mode }),
  });
  renderActivePlaybacks();
};

window.deleteSound = async function(id) {
  if (!confirm('Delete this clip and its file?')) return;
  await fetch(`/sounds/${encodeURIComponent(id)}`, { method: 'DELETE' });
  fetchSounds(); fetchSoundTags();
};

window.editSound = function(id) {
  const clip = soundClips.find(c => c.id === id); if (!clip) return;
  const overlay = document.createElement('div');
  overlay.className = 'sb-modal-overlay';
  overlay.innerHTML = `
    <div class="sb-modal" onclick="event.stopPropagation()">
      <div class="sb-modal-title">Edit clip</div>
      <label class="sb-modal-label">Name</label>
      <input class="sb-input" id="sb-edit-name" value="${esc(clip.name)}">
      <label class="sb-modal-label">Tags (comma-separated)</label>
      <input class="sb-input" id="sb-edit-tags" value="${esc((clip.tags||[]).join(', '))}">
      <label class="sb-modal-label">Default volume <span id="sb-edit-vol-val">${(clip.default_volume ?? 1.0).toFixed(2)}</span></label>
      <input type="range" id="sb-edit-vol" min="0" max="2" step="0.01" value="${clip.default_volume ?? 1.0}"
             oninput="document.getElementById('sb-edit-vol-val').textContent=parseFloat(this.value).toFixed(2)">
      <label class="sb-modal-label"><input type="checkbox" id="sb-edit-loop" ${clip.default_loop ? 'checked' : ''}> Loop by default</label>
      <div class="sb-modal-actions">
        <button class="sb-btn" onclick="closeEditModal()">Cancel</button>
        <button class="sb-btn primary" onclick="submitEditModal('${id}')">Save</button>
      </div>
    </div>`;
  overlay.onclick = closeEditModal;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('sb-edit-name')?.focus(), 0);
};

window.closeEditModal = function() {
  document.querySelectorAll('.sb-modal-overlay').forEach(o => o.remove());
};

window.submitEditModal = async function(id) {
  const name = document.getElementById('sb-edit-name').value.trim();
  const tags = document.getElementById('sb-edit-tags').value
    .split(',').map(s => s.trim()).filter(Boolean);
  const default_volume = parseFloat(document.getElementById('sb-edit-vol').value);
  const default_loop = document.getElementById('sb-edit-loop').checked;
  await fetch(`/sounds/${encodeURIComponent(id)}`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, tags, default_volume, default_loop }),
  });
  closeEditModal();
  fetchSounds(); fetchSoundTags();
};
