<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pw-ctl — PipeWire Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ── Themes ──────────────────────────────────────────────────── */
:root {
  --bg:       #07090c;
  --surf0:    #0c1018;
  --surf1:    #111820;
  --surf2:    #17202a;
  --border-l: #161e28;
  --border-m: #1e2d3c;
  --border-h: #2a3d50;

  --text-100: #b8ccd8;
  --text-60:  #4e6578;
  --text-30:  #273340;

  --green:    #0fdb72;
  --amber:    #f0a020;
  --slate:    #38505f;
  --blue:     #38a8f0;
  --red:      #f03838;
  --teal:     #20a0b8;

  --sink-c:   #2070d8;
  --source-c: #10a858;
  --play-c:   #8830e0;
  --cap-c:    #d85010;

  --font-ui:   'Oxanium', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;

  /* graph node bg (CSS-driven so OLED can override) */
  --gn-bg:     #111820;
  --gn-border: #161e28;
  --gn-bg-h:   #17202a;
  --gn-brd-h:  #2a3d50;
}

/* True-black OLED overrides */
html.oled {
  --bg:       #000000;
  --surf0:    #050505;
  --surf1:    #080808;
  --surf2:    #0d0d0d;
  --border-l: #111111;
  --border-m: #191919;
  --border-h: #242424;

  --text-100: #c8dce8;
  --text-60:  #4a5f70;
  --text-30:  #222c34;

  --green:    #12f07c;
  --amber:    #f5a820;
  --blue:     #3ab0f5;
  --red:      #f54040;
  --teal:     #22a8c0;

  --sink-c:   #2278e0;
  --source-c: #12b060;
  --play-c:   #9035f0;
  --cap-c:    #e05515;

  --gn-bg:     #080808;
  --gn-border: #141414;
  --gn-bg-h:   #0d0d0d;
  --gn-brd-h:  #222222;
}

/* ── Base ────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text-100);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.55;
  overflow-x: hidden;
  transition: background .3s, color .3s;
}

/* ── Background texture ──────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,.008) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.008) 1px, transparent 1px);
  background-size: 48px 48px, 48px 48px, 48px 48px;
  background-position: 0 0, 24px 0, 0 24px;
  pointer-events: none;
  z-index: 0;
  transition: opacity .3s;
}
html.oled body::before {
  background-image:
    radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 40%, rgba(0,80,120,.06) 0%, transparent 100%),
    radial-gradient(ellipse 40% 50% at 85% 70%, rgba(0,120,60,.04) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
  transition: opacity .3s;
}
html.oled body::after { opacity: 0; }

/* ── App ─────────────────────────────────────────────────────── */
#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── Header ──────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: rgba(7,9,12,.94);
  backdrop-filter: blur(14px);
  border-bottom: none;
  box-shadow: 0 1px 0 var(--border-m), 0 2px 0 rgba(32,160,184,.05);
  gap: 16px;
  transition: background .3s, box-shadow .3s;
}
html.oled header {
  background: rgba(0,0,0,.97);
  box-shadow: 0 1px 0 var(--border-m), 0 2px 0 rgba(32,168,192,.07);
}

.hd-left { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

.logo { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
.logo-ring {
  position: absolute; inset: 0;
  border: 1.5px solid var(--teal);
  border-radius: 50%;
  animation: logo-spin 8s linear infinite;
}
.logo-ring::before {
  content: '';
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px;
  background: var(--teal);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--teal);
}
.logo-dot {
  position: absolute; inset: 7px;
  background: var(--teal);
  border-radius: 50%;
  opacity: .7;
  animation: logo-pulse 2s ease-in-out infinite;
}
@keyframes logo-spin  { to { transform: rotate(360deg); } }
@keyframes logo-pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(.5);opacity:.3} }

h1 {
  font-family: var(--font-ui);
  font-size: 18px; font-weight: 700;
  letter-spacing: .12em; text-transform: lowercase;
  color: var(--teal);
}
.subtitle {
  font-size: 10px;
  color: var(--text-60);
  letter-spacing: .06em;
  border-left: 1px solid var(--border-m);
  padding-left: 14px;
  line-height: 1.3;
}

/* ── Tabs ─────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; flex: 1; justify-content: center; }
.tab-btn {
  padding: 5px 18px;
  background: none;
  border: 1px solid var(--border-m);
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-60);
  transition: color .2s, border-color .2s, background .2s, box-shadow .2s;
}
.tab-btn:hover  { color: var(--text-100); border-color: var(--border-h); }
.tab-btn.active {
  color: var(--teal);
  border-color: var(--teal);
  background: rgba(32,160,184,.07);
  box-shadow: 0 0 8px rgba(32,160,184,.12);
}

/* ── Header right ────────────────────────────────────────────── */
.hd-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.apply-btn { background: rgba(32,160,100,.15) !important; border-color: rgba(32,160,100,.35) !important; color: #3ecf7a !important; }
.apply-btn:hover { background: rgba(32,160,100,.28) !important; border-color: #3ecf7a !important; }
.apply-btn.busy, .oled-btn.busy { opacity: .5; pointer-events: none; }

/* Config preview modal */
#cfg-modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.72); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#cfg-modal-backdrop.open { display: flex; }
#cfg-modal {
  background: var(--bg-2); border: 1px solid var(--border-m);
  border-radius: 10px; width: min(780px, 94vw); max-height: 82vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,.7);
}
#cfg-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border-l);
  gap: 12px; flex-wrap: wrap;
}
#cfg-modal-header h2 { font-size: 13px; font-weight: 600; margin: 0; color: var(--text-100); }
.cfg-tabs { display: flex; gap: 6px; }
.cfg-tab { background: none; border: 1px solid var(--border-l); color: var(--text-50);
  border-radius: 5px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
.cfg-tab.active { border-color: var(--teal); color: var(--teal); }
#cfg-modal-close { background: none; border: none; color: var(--text-30);
  font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
#cfg-modal-close:hover { color: var(--text-100); }
#cfg-modal-body { flex: 1; overflow: auto; }
#cfg-modal-body pre {
  margin: 0; padding: 16px 20px; font-family: var(--font-mono);
  font-size: 11.5px; line-height: 1.6; color: var(--text-80);
  white-space: pre; tab-size: 2;
}
#cfg-modal-footer {
  padding: 12px 18px; border-top: 1px solid var(--border-l);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.cfg-paths { font-size: 10px; color: var(--text-30); font-family: var(--font-mono); line-height: 1.7; }
.cfg-apply-btn {
  background: rgba(32,160,100,.15); border: 1px solid rgba(32,160,100,.35);
  color: #3ecf7a; border-radius: 6px; padding: 7px 18px;
  font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.cfg-apply-btn:hover { background: rgba(32,160,100,.28); border-color: #3ecf7a; }
.cfg-apply-btn:disabled { opacity: .45; pointer-events: none; }

.stat { display: flex; align-items: baseline; gap: 4px; padding: 0 10px; border-right: 1px solid var(--border-l); }
.stat-n { font-family: var(--font-ui); font-size: 20px; font-weight: 600; color: var(--text-100); transition: color .3s; }
.stat-l { font-size: 10px; color: var(--text-60); }

/* OLED toggle */
.oled-btn {
  padding: 4px 10px;
  background: none;
  border: 1px solid var(--border-m);
  border-radius: 2px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-30);
  transition: color .2s, border-color .2s, background .2s, box-shadow .2s;
  user-select: none;
}
.oled-btn:hover { color: var(--text-60); border-color: var(--border-h); }
html.oled .oled-btn {
  color: var(--teal);
  border-color: var(--teal);
  background: rgba(32,160,184,.06);
  box-shadow: 0 0 6px rgba(32,160,184,.18);
}

/* WS pill */
.ws-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border: 1px solid var(--border-m);
  border-radius: 20px;
  font-size: 10px;
  letter-spacing: .04em;
  transition: border-color .3s, color .3s;
}
.ws-dot { width: 6px; height: 6px; border-radius: 50%; transition: background .3s, box-shadow .3s; }
.ws-pill.connected    { border-color: var(--green); color: var(--green); }
.ws-pill.connecting,
.ws-pill.reconnecting { border-color: var(--amber); color: var(--amber); }
.ws-pill.disconnected { border-color: var(--red);   color: var(--red);   }
.ws-pill.connected    .ws-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2.5s ease-in-out infinite; }
.ws-pill.connecting   .ws-dot,
.ws-pill.reconnecting .ws-dot { background: var(--amber); animation: blink .9s ease-in-out infinite; }
.ws-pill.disconnected .ws-dot { background: var(--red); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Monitor view ────────────────────────────────────────────── */
#view-monitor { flex: 1; padding: 14px; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:860px){ .grid { grid-template-columns: 1fr; } }

/* ── Graph view ──────────────────────────────────────────────── */
#view-graph { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#graph-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px;
  border-bottom: 1px solid var(--border-l);
  background: rgba(0,0,0,.2);
  flex-shrink: 0;
}
#graph-toolbar-label {
  font-size: 9px; color: var(--text-30);
  text-transform: uppercase; letter-spacing: .1em;
  flex: 1;
}
.graph-btn {
  padding: 3px 12px;
  background: none; border: 1px solid var(--border-m);
  border-radius: 2px; cursor: pointer;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: .05em;
  color: var(--text-60);
  transition: color .2s, border-color .2s;
}
.graph-btn:hover { color: var(--text-100); border-color: var(--border-h); }

#graph-container { flex: 1; overflow: auto; position: relative; }
#graph-svg { display: block; cursor: default; }

/* SVG gnode hover via CSS (works because we keep elements in DOM via innerHTML) */
.gnode { cursor: grab; }
.gnode:active { cursor: grabbing; }
.nb { fill: var(--gn-bg); stroke: var(--gn-border); stroke-width: 1px; }
.gnode:hover .nb { fill: var(--gn-bg-h); stroke: var(--gn-brd-h); }

/* Active link flow animation */
@keyframes lk-flow { to { stroke-dashoffset: -26; } }
.lk-active { stroke-dasharray: 9 5; animation: lk-flow 1.8s linear infinite; }

/* Graph hover — 4 highlight levels */
path.lk-hi-strong { stroke-opacity: 0.95 !important; stroke-width: 2.5px !important; }
path.lk-hi-medium { stroke-opacity: 0.60 !important; stroke-width: 2px   !important; }
path.lk-faded     { stroke-opacity: 0.03 !important; }
.gnode.gnode-focal .nb { stroke: rgba(255,255,255,.45) !important; stroke-width: 1.5px !important; fill: var(--gn-bg-h) !important; }
.gnode.gnode-hi    .nb { stroke: rgba(255,255,255,.22) !important; fill: var(--gn-bg-h) !important; }
.gnode.gnode-near      { opacity: 0.58; transition: opacity .12s; }
.gnode.gnode-faded     { opacity: 0.12; transition: opacity .12s; }

/* ── Section ─────────────────────────────────────────────────── */
.section {
  display: flex; flex-direction: column;
  background: var(--surf0);
  border: 1px solid var(--border-l);
  border-radius: 4px;
  overflow: hidden;
  transition: background .3s, border-color .3s;
}

.sec-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px 8px;
  border-bottom: 1px solid var(--border-l);
  background: rgba(0,0,0,.28);
  position: relative;
}
#s-sinks   .sec-hd { border-top: 2px solid var(--sink-c); }
#s-sources .sec-hd { border-top: 2px solid var(--source-c); }
#s-play    .sec-hd { border-top: 2px solid var(--play-c); }
#s-cap     .sec-hd { border-top: 2px solid var(--cap-c); }

.sec-ico { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
#s-sinks   .sec-ico { color: var(--sink-c); }
#s-sources .sec-ico { color: var(--source-c); }
#s-play    .sec-ico { color: var(--play-c); }
#s-cap     .sec-ico { color: var(--cap-c); }

.sec-title { font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; flex: 1; }
.sec-badge { font-family: var(--font-mono); font-size: 9px; color: var(--text-60); background: var(--border-l); padding: 1px 6px; border-radius: 10px; }

/* ── Node container ──────────────────────────────────────────── */
.nc { padding: 8px; display: flex; flex-direction: column; gap: 5px; min-height: 52px; }
.nc:empty::after {
  content: 'no nodes';
  display: block; text-align: center;
  color: var(--text-30); padding: 14px 0;
  font-size: 10px; letter-spacing: .06em;
}

/* ── Node card ───────────────────────────────────────────────── */
.card {
  background: var(--surf1);
  border: 1px solid var(--border-l);
  border-left: 3px solid var(--slate);
  border-radius: 3px;
  overflow: hidden;
  transition: opacity .22s ease, transform .22s ease, border-color .25s, background .25s, box-shadow .25s;
  will-change: transform, opacity;
}
.card:hover {
  border-color: var(--border-h);
  background: var(--surf2);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,.35);
}

.card.entering { opacity: 0; transform: translateY(-6px) scale(.98); }
.card.leaving  { opacity: 0; transform: scale(.97) translateY(4px); }

.card[data-state="Running"]   { border-left-color: var(--green); box-shadow: -2px 0 10px rgba(15,219,114,.12); }
.card[data-state="Idle"]      { border-left-color: var(--amber); }
.card[data-state="Suspended"] { border-left-color: var(--slate); }
.card[data-state="Creating"]  { border-left-color: var(--blue); }
.card[data-state="Error"]     { border-left-color: var(--red); box-shadow: -2px 0 8px rgba(240,56,56,.1); }

.card[data-state="Running"]:hover { box-shadow: translateY(-1px), -2px 0 12px rgba(15,219,114,.18), 0 4px 14px rgba(0,0,0,.35); }

/* ── Card body ───────────────────────────────────────────────── */
.card-body { padding: 7px 9px 6px; display: grid; grid-template-columns: 8px 1fr auto; gap: 0 8px; align-items: start; }

.led {
  width: 7px; height: 7px; border-radius: 50%;
  margin-top: 4px; background: var(--slate);
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
[data-state="Running"]   .led { background: var(--green); box-shadow: 0 0 5px var(--green), 0 0 12px rgba(15,219,114,.3); }
[data-state="Idle"]      .led { background: var(--amber); box-shadow: 0 0 4px var(--amber); animation: blink 2.2s ease-in-out infinite; }
[data-state="Suspended"] .led { background: var(--slate); }
[data-state="Creating"]  .led { background: var(--blue);  animation: blink .6s ease-in-out infinite; }
[data-state="Error"]     .led { background: var(--red);   box-shadow: 0 0 5px var(--red); animation: blink .45s ease-in-out infinite; }

.cc { min-width: 0; }
.card-name { font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: var(--text-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

.badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.badge { font-size: 9px; padding: 0 4px; border: 1px solid; border-radius: 2px; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; }
.badge-cls     { border-color: var(--text-30); color: var(--text-60); }
.badge-default { border-color: var(--amber); color: var(--amber); background: rgba(240,160,32,.08); font-weight: 600; letter-spacing: .06em; }
.badge-st  { border-color: currentColor; }
[data-state="Running"]   .badge-st { color: var(--green); }
[data-state="Idle"]      .badge-st { color: var(--amber); }
[data-state="Suspended"] .badge-st { color: var(--slate); }
[data-state="Creating"]  .badge-st { color: var(--blue); }
[data-state="Error"]     .badge-st { color: var(--red); }

.card-app   { margin-top: 2px; color: var(--text-60); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-media { margin-top: 1px; color: var(--text-30); font-size: 10px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pid { color: var(--text-30); font-size: 9px; margin-left: 4px; }

.ports { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; font-size: 10px; color: var(--text-60); white-space: nowrap; }
.prow  { display: flex; align-items: center; gap: 3px; }
.arr-in  { color: var(--blue); }
.arr-out { color: var(--green); }

/* ── Card footer ─────────────────────────────────────────────── */
.card-foot { display: flex; flex-wrap: wrap; gap: 0; border-top: 1px solid var(--border-l); }
.kv { display: flex; gap: 4px; align-items: baseline; padding: 3px 9px 3px 25px; border-right: 1px solid var(--border-l); }
.kv:last-child { border-right: none; }
.kk     { font-size: 8px; color: var(--text-30); text-transform: uppercase; letter-spacing: .05em; }
.kv-val { font-size: 9px; color: var(--text-60); }

/* ── Now Playing ─────────────────────────────────────────────── */
.playing-wrap { border-top: 1px solid var(--border-l); }
.playing-header { display: flex; align-items: center; gap: 6px; padding: 4px 9px 3px 25px; font-size: 9px; color: var(--text-30); text-transform: uppercase; letter-spacing: .07em; }
.playing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 4px var(--green); animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
.playing-list { padding: 0 9px 5px 25px; }
.playing-row  { display: flex; align-items: center; gap: 7px; padding: 2px 0; font-size: 10px; color: var(--text-60); }
.playing-led  { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.playing-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-100); }
.playing-fmt  { font-size: 9px; color: var(--teal); background: rgba(32,160,184,.08); border: 1px solid rgba(32,160,184,.2); padding: 0 4px; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }
.playing-app  { font-size: 9px; color: var(--text-30); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }

/* ── Props toggle ────────────────────────────────────────────── */
.props-wrap { border-top: 1px solid var(--border-l); }
.props-toggle { display: flex; align-items: center; gap: 5px; width: 100%; padding: 3px 9px 3px 25px; background: none; border: none; color: var(--text-60); font-size: 10px; font-family: var(--font-mono); cursor: pointer; text-align: left; transition: color .15s; }
.props-toggle:hover { color: var(--teal); }
.arr { display: inline-block; font-size: 8px; transition: transform .2s ease; }
.props-toggle.open .arr { transform: rotate(90deg); }
.props-body { display: none; padding: 4px 9px 8px 25px; max-height: 180px; overflow-y: auto; }
.props-body.show { display: block; }
.prop { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1.6fr); gap: 8px; padding: 1px 0; font-size: 10px; }
.pk { color: var(--teal); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pv { color: var(--text-100); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--surf0); }
::-webkit-scrollbar-thumb { background: var(--border-m); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-h); }

/* ── Presets view ────────────────────────────────────────────── */
#view-presets { flex: 1; display: flex; overflow: hidden; }
.preset-layout { display: flex; flex: 1; overflow: hidden; }

.preset-sidebar {
  width: 230px; flex-shrink: 0;
  border-right: 1px solid var(--border-l);
  background: var(--surf0);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.preset-sidebar-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border-l);
  background: rgba(0,0,0,.28);
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-60);
  flex-shrink: 0;
}
.preset-add-btn {
  width: 22px; height: 22px;
  background: none; border: 1px solid var(--border-m);
  border-radius: 3px; cursor: pointer; color: var(--text-60);
  font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
  transition: color .2s, border-color .2s, background .2s;
}
.preset-add-btn:hover { color: var(--teal); border-color: var(--teal); background: rgba(32,160,184,.06); }

#preset-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 3px; }

.preset-item {
  padding: 7px 10px; border-radius: 3px;
  background: var(--surf1); border: 1px solid var(--border-l);
  cursor: pointer; transition: background .15s, border-color .15s, box-shadow .15s;
  display: flex; align-items: center; gap: 8px;
}
.preset-item:hover { background: var(--surf2); border-color: var(--border-m); }
.preset-item.selected { background: var(--surf2); border-color: var(--teal); box-shadow: 0 0 6px rgba(32,160,184,.12); }
.preset-item-led {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--slate); flex-shrink: 0;
  transition: background .3s, box-shadow .3s;
}
.preset-item.active .preset-item-led { background: var(--green); box-shadow: 0 0 5px var(--green); animation: blink 2.5s ease-in-out infinite; }
.preset-item-name { font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--text-100); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.preset-item-id   { font-size: 9px; color: var(--text-30); flex-shrink: 0; }

.preset-detail {
  flex: 1; overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.preset-detail-empty {
  display: flex; align-items: center; justify-content: center;
  flex: 1; color: var(--text-30); font-size: 12px; letter-spacing: .06em;
}

.pd-header {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-l);
  flex-wrap: wrap;
}
.pd-name {
  flex: 1; min-width: 140px;
  background: none; border: none; border-bottom: 1px solid var(--border-m);
  color: var(--text-100); font-family: var(--font-ui); font-size: 18px; font-weight: 600;
  padding: 2px 4px; outline: none;
  transition: border-color .2s;
}
.pd-name:focus { border-bottom-color: var(--teal); }
.pd-btn {
  padding: 5px 14px; border-radius: 3px; border: 1px solid; cursor: pointer;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em;
  background: none; transition: background .15s, box-shadow .15s;
}
.pd-btn-activate   { color: var(--green);  border-color: var(--green);  }
.pd-btn-activate:hover   { background: rgba(15,219,114,.08); box-shadow: 0 0 8px rgba(15,219,114,.15); }
.pd-btn-deactivate { color: var(--amber);  border-color: var(--amber);  }
.pd-btn-deactivate:hover { background: rgba(240,160,32,.08); }
.pd-btn-delete     { color: var(--red);    border-color: var(--red);    }
.pd-btn-delete:hover     { background: rgba(240,56,56,.08); }
.pd-ch-sel {
  background: var(--surf1); color: var(--text-70); border: 1px solid var(--border-m);
  border-radius: 3px; font-family: var(--font-mono); font-size: 10px; padding: 4px 8px;
  cursor: pointer;
}
.pd-ch-sel:focus { outline: none; border-color: var(--teal); }

.pd-section { background: var(--surf0); border: 1px solid var(--border-l); border-radius: 4px; overflow: hidden; }
.pd-section-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px 7px;
  border-bottom: 1px solid var(--border-l);
  background: rgba(0,0,0,.28);
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text-60);
}
.pd-section-body { padding: 10px 14px; }

/* Effect chain */
.chain-card {
  border: 1px solid var(--border-l); border-radius: 3px;
  background: rgba(0,0,0,.18); margin-bottom: 8px;
}
.chain-card.bypassed { opacity: .55; }
.chain-hd {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-bottom: 1px solid transparent;
  background: rgba(0,0,0,.25); cursor: pointer; user-select: none;
}
.chain-hd:hover { background: rgba(255,255,255,.04); }
.chain-card.open > .chain-hd { border-bottom-color: var(--border-l); }
.chain-caret { color: var(--text-30); font-size: 9px; width: 10px; text-align: center; }
.chain-pos {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-30);
  min-width: 16px; text-align: center;
}
.chain-title { flex: 1; min-width: 0; }
.chain-name { font-size: 11px; color: var(--text-100); font-weight: 600;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chain-class { font-size: 9px; color: var(--text-30); letter-spacing: .04em; text-transform: uppercase; }
.chain-btn {
  background: none; border: 1px solid var(--border-m); color: var(--text-60);
  font-size: 10px; padding: 2px 6px; border-radius: 2px; cursor: pointer;
}
.chain-btn:hover:not([disabled]) { color: var(--text-100); border-color: var(--teal); }
.chain-btn[disabled] { opacity: .3; cursor: default; }
.chain-btn-del { color: var(--orange); border-color: rgba(255,140,80,.3); }
.chain-bypass { font-size: 10px; color: var(--text-60); display: flex; align-items: center; gap: 3px; cursor: pointer; }
.chain-bypass input { accent-color: var(--orange); cursor: pointer; }
.chain-body { padding: 8px 10px; }
.chain-body.bypassed { pointer-events: none; }
.chain-loading, .chain-empty, .chain-error {
  font-size: 10px; color: var(--text-30); padding: 4px 0;
}
.chain-error { color: var(--orange); }

/* Generic LV2 control grid */
.lv2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.lv2-row {
  display: grid; grid-template-columns: 1fr minmax(120px, 1.4fr);
  align-items: center; gap: 6px; font-size: 10px;
  padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.03);
}
.lv2-label { color: var(--text-60); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lv2-sel, .lv2-num {
  background: var(--surf1); border: 1px solid var(--border-l);
  color: var(--text-100); font-family: var(--font-mono); font-size: 10px;
  border-radius: 2px; padding: 1px 4px; outline: none;
}
.lv2-num { text-align: right; }
.lv2-slider-wrap { display: flex; align-items: center; gap: 6px; }
.lv2-slider { flex: 1; accent-color: var(--teal); cursor: pointer; min-width: 0; }
.lv2-val {
  font-family: var(--font-mono); font-size: 9px; color: var(--teal);
  min-width: 44px; text-align: right;
}

/* Plugin picker modal */
.modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.6); align-items: center; justify-content: center;
}
.modal {
  width: min(720px, 92vw); max-height: 80vh; display: flex; flex-direction: column;
  background: var(--surf0); border: 1px solid var(--border-l); border-radius: 3px;
  font-family: var(--font-ui);
}
.modal-hd {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; border-bottom: 1px solid var(--border-l);
  font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-60); background: rgba(0,0,0,.28);
}
.modal-close {
  background: none; border: none; color: var(--text-60); font-size: 18px;
  cursor: pointer; line-height: 1;
}
.modal-search {
  display: grid; grid-template-columns: 1fr 200px; gap: 6px;
  padding: 8px 12px; border-bottom: 1px solid var(--border-l);
}
.modal-search input, .modal-search select {
  background: var(--surf1); border: 1px solid var(--border-l);
  color: var(--text-100); font-size: 11px; padding: 4px 6px; border-radius: 2px;
  outline: none; font-family: var(--font-mono);
}
.modal-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.pp-item {
  padding: 6px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.03);
}
.pp-item:hover { background: rgba(255,255,255,.04); }
.pp-name { font-size: 11px; color: var(--text-100); display: flex; align-items: center; gap: 6px; }
.pp-badge {
  font-size: 8px; letter-spacing: .06em; padding: 1px 5px; border-radius: 3px;
  font-family: var(--font-mono); border: 1px solid transparent;
}
.pp-badge-lv2    { color: var(--teal);   border-color: rgba(64,224,208,.4); }
.pp-badge-ladspa { color: var(--orange); border-color: rgba(255,140,80,.4); }
.pp-class { font-size: 9px; color: var(--teal); letter-spacing: .04em; text-transform: uppercase; }
.pp-uri { font-size: 9px; color: var(--text-30); font-family: var(--font-mono);
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pp-empty { padding: 12px; color: var(--text-30); font-size: 10px; text-align: center; }

/* Outputs */
.output-row {
  display: grid; grid-template-columns: 1fr 120px 28px 26px; gap: 6px; align-items: center;
  padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.03);
}
.output-row:last-child { border-bottom: none; }
.out-name {
  background: var(--surf1); border: 1px solid var(--border-l);
  color: var(--text-100); font-family: var(--font-mono); font-size: 10px;
  border-radius: 2px; padding: 2px 6px; width: 100%; outline: none;
}
.vol-wrap { display: flex; align-items: center; gap: 5px; }
.vol-slider { flex: 1; accent-color: var(--teal); cursor: pointer; min-width: 0; }
.vol-val { font-size: 9px; color: var(--teal); min-width: 30px; text-align: right; font-family: var(--font-mono); }
.vol-pct {
  font-size: 9px; color: var(--teal); width: 42px; text-align: right;
  font-family: var(--font-mono);
  background: transparent; border: 1px solid transparent; border-radius: 3px;
  padding: 1px 3px; cursor: text;
}
.vol-pct:hover { border-color: var(--border-m); }
.vol-pct:focus { outline: none; border-color: var(--teal); background: var(--surf2); color: var(--text-100); }
.rm-btn {
  background: none; border: 1px solid var(--border-m); border-radius: 2px;
  color: var(--text-60); cursor: pointer; font-size: 14px; line-height: 1;
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  transition: color .15s, border-color .15s;
}
.rm-btn:hover { color: var(--red); border-color: var(--red); }
.sink-picker-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.sink-select {
  flex: 1; min-width: 0;
  background: var(--surf1); border: 1px solid var(--border-l);
  color: var(--text-100); font-family: var(--font-mono); font-size: 10px;
  border-radius: 2px; padding: 3px 6px; outline: none; cursor: pointer;
  transition: border-color .15s;
  /* native select dark styling */
  color-scheme: dark;
}
.sink-select:focus { border-color: var(--teal); }
.sink-select option         { background: #111820; color: #b8ccd8; }
.sink-select optgroup       { background: #0c1018; color: #4e6578; font-style: normal; font-size: 9px; }
.sink-select option.running { color: var(--green); }
.sink-select option.idle    { color: var(--amber); }
.add-out-btn {
  padding: 3px 12px; background: none; border: 1px solid var(--teal);
  border-radius: 2px; color: var(--teal); font-family: var(--font-mono); font-size: 10px;
  cursor: pointer; transition: background .15s; white-space: nowrap; flex-shrink: 0;
}
.add-out-btn:hover { background: rgba(32,160,184,.08); }

/* Routing */
.route-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.03);
}
.route-row:last-child { border-bottom: none; }
.route-name { flex: 1 1 0; min-width: 60px; font-size: 11px; color: var(--text-100); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.route-row .vol-slider { flex: 1 1 0; min-width: 60px; }
.route-app  { font-size: 9px; color: var(--text-30); white-space: nowrap; }
.route-btn {
  padding: 2px 10px; background: none; border-radius: 2px; cursor: pointer;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: .05em;
  transition: background .15s; white-space: nowrap;
}
.route-btn-route   { border: 1px solid var(--play-c); color: var(--play-c); }
.route-btn-route:hover   { background: rgba(136,48,224,.1); }
.route-btn-unroute { border: 1px solid var(--amber);  color: var(--amber);  }
.route-btn-unroute:hover { background: rgba(240,160,32,.1); }

/* Mute button (shared between output rows and mixer) */
.mute-btn {
  width: 26px; height: 26px; border-radius: 3px; border: 1px solid var(--border-m);
  background: none; color: var(--text-60); cursor: pointer; font-size: 9px;
  font-family: var(--font-mono); letter-spacing: .04em;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, border-color .15s, background .15s; flex-shrink: 0;
}
.mute-btn:hover { color: var(--amber); border-color: var(--amber); }
.mute-btn.muted { color: var(--red); border-color: var(--red); background: rgba(240,56,56,.08); }
.mute-btn:disabled { opacity: .3; cursor: default; }
.pd-btn-mute { color: var(--amber); border-color: var(--amber); }
.pd-btn-mute:hover { background: rgba(240,160,32,.08); }
.pd-btn-muted { color: var(--red); border-color: var(--red); }
.pd-btn-muted:hover { background: rgba(240,56,56,.08); }

/* ── Mixer view ──────────────────────────────────────────────── */
#view-mixer { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.mix-section { background: var(--surf0); border: 1px solid var(--border-l); border-radius: 4px; overflow: hidden; }
.mix-section-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px 7px;
  background: rgba(0,0,0,.28); border-bottom: 1px solid var(--border-l);
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text-60);
}
.mix-group-hd {
  padding: 5px 14px 3px;
  font-size: 9px; color: var(--text-30);
  letter-spacing: .07em; text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,.02);
  background: rgba(0,0,0,.12);
}
.mix-row {
  display: grid; grid-template-columns: minmax(0,1fr) 150px 36px 28px; gap: 8px; align-items: center;
  padding: 5px 14px; border-bottom: 1px solid rgba(255,255,255,.025);
}
.mix-row:last-child { border-bottom: none; }
.mix-label { font-size: 11px; color: var(--text-100); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mix-empty { padding: 10px 14px; font-size: 10px; color: var(--text-30); }

/* Create form */
.create-preset-form {
  padding: 8px; background: var(--surf2); border: 1px solid var(--border-m);
  border-radius: 3px; display: flex; flex-direction: column; gap: 7px;
}
.create-input {
  background: var(--surf1); border: 1px solid var(--border-l);
  color: var(--text-100); font-family: var(--font-mono); font-size: 11px;
  border-radius: 2px; padding: 5px 8px; outline: none; transition: border-color .15s;
}
.create-input:focus { border-color: var(--teal); }
.create-btns { display: flex; gap: 6px; }
.create-ok {
  flex: 1; padding: 4px; background: rgba(32,160,184,.1); border: 1px solid var(--teal);
  border-radius: 2px; color: var(--teal); font-family: var(--font-mono); font-size: 10px;
  cursor: pointer; transition: background .15s;
}
.create-ok:hover { background: rgba(32,160,184,.18); }
.create-cancel {
  padding: 4px 10px; background: none; border: 1px solid var(--border-m);
  border-radius: 2px; color: var(--text-60); font-family: var(--font-mono); font-size: 10px;
  cursor: pointer;
}
/* ── Soundboard ─────────────────────────────────────────────────────── */
#view-sounds { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.sb-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sb-toolbar { padding: 12px 14px; border-bottom: 1px solid var(--border-m); background: var(--surf1); display: flex; flex-direction: column; gap: 8px; }
.sb-toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sb-input { background: var(--bg); color: var(--text-100); border: 1px solid var(--border-m); border-radius: 6px; padding: 6px 10px; font-family: var(--font-ui); font-size: 13px; min-width: 160px; }
.sb-input:focus { outline: none; border-color: var(--blue); }
.sb-btn { background: var(--surf2); color: var(--text-100); border: 1px solid var(--border-m); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-family: var(--font-ui); font-size: 12px; }
.sb-btn:hover { border-color: var(--blue); }
.sb-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.sb-tag-row { display: flex; flex-wrap: wrap; gap: 6px; min-height: 22px; }
.sb-tag { background: var(--surf2); color: var(--text-60); border: 1px solid var(--border-m); border-radius: 12px; padding: 2px 10px; font-size: 11px; cursor: pointer; user-select: none; }
.sb-tag:hover { border-color: var(--blue); color: var(--text-100); }
.sb-tag.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.sb-tag .sb-tag-count { opacity: 0.7; margin-left: 4px; font-size: 10px; }
.sb-panel { padding: 8px 0; }
.sb-panel-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sb-status { font-size: 11px; color: var(--text-60); margin-top: 6px; min-height: 14px; }
.sb-status.error { color: #e54040; }
.sb-status.ok { color: #3ca85c; }
.sb-grid { flex: 1; overflow-y: auto; padding: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; align-content: start; }
.sb-card { background: var(--surf1); border: 1px solid var(--border-m); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 6px; transition: border-color 0.1s; position: relative; }
.sb-card:hover { border-color: var(--border-h); }
.sb-card-play { background: var(--blue); border: none; color: #fff; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; margin-top: 4px; }
.sb-card-play:hover { filter: brightness(1.15); }
.sb-card-play:active { transform: scale(0.97); }
.sb-card.playing { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
.sb-card-name { font-weight: 600; font-size: 13px; color: var(--text-100); word-break: break-word; }
.sb-card-meta { font-size: 11px; color: var(--text-60); display: flex; justify-content: space-between; }
.sb-card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.sb-card-tag { font-size: 9px; background: var(--surf2); color: var(--text-60); border-radius: 6px; padding: 1px 5px; }
.sb-card-actions { display: flex; gap: 4px; margin-top: 4px; }
.sb-card-actions button { flex: 1; font-size: 10px; padding: 3px 6px; background: var(--surf2); border: 1px solid var(--border-m); color: var(--text-60); border-radius: 4px; cursor: pointer; }
.sb-card-actions button:hover { color: var(--text-100); border-color: var(--blue); }
.sb-active { border-top: 1px solid var(--border-m); background: var(--surf1); padding: 10px 14px; max-height: 35vh; overflow-y: auto; }
.sb-active-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px dashed var(--border-m); }
.sb-active-row:last-child { border-bottom: none; }
.sb-active-name { flex: 1; font-size: 13px; color: var(--text-100); min-width: 120px; }
.sb-active-target { font-size: 11px; color: var(--text-60); font-family: var(--font-mono); }
.sb-active-vol { width: 100px; }
.sb-active-loop { font-size: 11px; cursor: pointer; user-select: none; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border-m); color: var(--text-60); }
.sb-active-loop.on { background: var(--blue); color: #fff; border-color: var(--blue); }
.sb-active-stop { background: #e54040; border: none; color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.sb-target-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.sb-target-label { font-size: 11px; color: var(--text-60); text-transform: uppercase; letter-spacing: 0.05em; }
.sb-target-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.sb-target-chip { background: var(--surf2); color: var(--text-60); border: 1px solid var(--border-m); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; user-select: none; }
.sb-target-chip:hover { border-color: var(--blue); color: var(--text-100); }
.sb-target-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.sb-target-chip.group { font-size: 9px; color: var(--text-30); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 4px; cursor: default; border: none; background: transparent; }
.sb-target-chip.group:hover { border: none; }
.sb-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.sb-modal { background: var(--surf1); border: 1px solid var(--border-h); border-radius: 12px; padding: 20px; min-width: 360px; max-width: 90vw; display: flex; flex-direction: column; gap: 8px; }
.sb-modal-title { font-size: 16px; font-weight: 600; color: var(--text-100); margin-bottom: 6px; }
.sb-modal-label { font-size: 11px; color: var(--text-60); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
.sb-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="hd-left">
      <div class="logo">
        <div class="logo-ring"></div>
        <div class="logo-dot"></div>
      </div>
      <h1>pw-ctl</h1>
      <span class="subtitle">PipeWire Monitor</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-monitor" onclick="switchTab('monitor')">Monitor</button>
      <button class="tab-btn"        id="tab-graph"   onclick="switchTab('graph')">Graph</button>
      <button class="tab-btn"        id="tab-presets" onclick="switchTab('presets')">Presets</button>
      <button class="tab-btn"        id="tab-mics"    onclick="switchTab('mics')">Virtual Mics</button>
      <button class="tab-btn"        id="tab-mixer"   onclick="switchTab('mixer')">Mixer</button>
      <button class="tab-btn"        id="tab-sounds"  onclick="switchTab('sounds')">Soundboard</button>
    </div>

    <div class="hd-right">
      <div class="stat">
        <span class="stat-n" id="total-n">0</span>
        <span class="stat-l">nodes</span>
      </div>
      <button class="oled-btn" id="preview-btn" onclick="configPreview()" title="Generate config preview in /tmp/pwctl/">Preview</button>
      <button class="oled-btn apply-btn" id="apply-btn" onclick="configApply()" title="Apply config and restart PipeWire">Save &amp; Apply</button>
      <button class="oled-btn" id="oled-btn" onclick="toggleOled()" title="Toggle true-black OLED mode">OLED</button>
      <div class="ws-pill connecting" id="ws-pill">
        <div class="ws-dot"></div>
        <span id="ws-txt">Connecting</span>
      </div>
    </div>
  </header>

  <!-- Monitor view -->
  <main id="view-monitor">
    <div class="grid">

      <div class="section" id="s-sinks">
        <div class="sec-hd">
          <div class="sec-ico">⊗</div>
          <span class="sec-title">Sinks</span>
          <span class="sec-badge" id="cnt-sinks">0</span>
        </div>
        <div class="nc" id="nc-sinks"></div>
      </div>

      <div class="section" id="s-sources">
        <div class="sec-hd">
          <div class="sec-ico">⊙</div>
          <span class="sec-title">Sources</span>
          <span class="sec-badge" id="cnt-sources">0</span>
        </div>
        <div class="nc" id="nc-sources"></div>
      </div>

      <div class="section" id="s-play">
        <div class="sec-hd">
          <div class="sec-ico">▶</div>
          <span class="sec-title">Playback Streams</span>
          <span class="sec-badge" id="cnt-play">0</span>
        </div>
        <div class="nc" id="nc-play"></div>
      </div>

      <div class="section" id="s-cap">
        <div class="sec-hd">
          <div class="sec-ico">◉</div>
          <span class="sec-title">Capture Streams</span>
          <span class="sec-badge" id="cnt-cap">0</span>
        </div>
        <div class="nc" id="nc-cap"></div>
      </div>

    </div>
  </main>

  <!-- Graph view -->
  <div id="view-graph" style="display:none">
    <div id="graph-toolbar">
      <span id="graph-toolbar-label">Audio signal graph — drag nodes to reposition</span>
      <button class="graph-btn" onclick="resetGraphLayout()">Reset Layout</button>
    </div>
    <div id="graph-container">
      <svg id="graph-svg"></svg>
    </div>
  </div>

  <!-- Virtual Mics view -->
  <div id="view-mics" style="display:none">
    <div class="preset-layout">
      <div class="preset-sidebar">
        <div class="preset-sidebar-hd">
          <span>Virtual Mics</span>
          <button class="preset-add-btn" id="mic-add-btn" onclick="toggleMicCreateForm()" title="New virtual mic">+</button>
        </div>
        <div id="mic-list">
          <div class="preset-detail-empty" style="padding:20px 0">no virtual mics</div>
        </div>
      </div>
      <div class="preset-detail" id="mic-detail">
        <div class="preset-detail-empty">select a virtual mic</div>
      </div>
    </div>
  </div>

  <!-- Mixer view -->
  <div id="view-mixer" style="display:none">
    <div class="mix-empty" style="padding:20px">Loading…</div>
  </div>

  <!-- Soundboard view -->
  <div id="view-sounds" style="display:none">
    <div class="sb-layout">
      <div class="sb-toolbar">
        <div class="sb-toolbar-row">
          <input id="sb-search" class="sb-input" placeholder="Search clips by name…" oninput="renderSounds()">
          <button class="sb-btn" onclick="toggleUploadPanel()">+ Upload</button>
          <button class="sb-btn" onclick="toggleYoutubePanel()">+ YouTube</button>
          <span id="sb-play-status" class="sb-status" style="margin-left:auto"></span>
        </div>
        <div class="sb-target-row">
          <span class="sb-target-label">Send to:</span>
          <span id="sb-target-chips" class="sb-target-chips"></span>
        </div>
        <div class="sb-tag-row" id="sb-tag-row"></div>
        <div class="sb-panel" id="sb-upload-panel" style="display:none">
          <div class="sb-panel-row">
            <input type="file" id="sb-upload-file" accept="audio/*">
            <input id="sb-upload-name" class="sb-input" placeholder="Name (optional)">
            <input id="sb-upload-tags" class="sb-input" placeholder="tags, comma, separated">
            <button class="sb-btn primary" onclick="uploadClip()">Upload</button>
          </div>
          <div id="sb-upload-status" class="sb-status"></div>
        </div>
        <div class="sb-panel" id="sb-youtube-panel" style="display:none">
          <div class="sb-panel-row">
            <input id="sb-yt-url" class="sb-input" placeholder="https://youtube.com/…" style="flex:2">
            <input id="sb-yt-name" class="sb-input" placeholder="Name (optional, fetched from title if empty)">
            <input id="sb-yt-tags" class="sb-input" placeholder="tags">
            <button class="sb-btn primary" onclick="ingestYoutube()">Download</button>
          </div>
          <div id="sb-yt-status" class="sb-status"></div>
        </div>
      </div>
      <div class="sb-grid" id="sb-grid"></div>
      <div class="sb-active" id="sb-active" style="display:none"></div>
    </div>
  </div>

  <!-- Presets view -->
  <div id="view-presets" style="display:none">
    <div class="preset-layout">
      <div class="preset-sidebar">
        <div class="preset-sidebar-hd">
          <span>Presets</span>
          <button class="preset-add-btn" id="preset-add-btn" onclick="toggleCreateForm()" title="New preset">+</button>
        </div>
        <div id="preset-list">
          <div class="preset-detail-empty" style="padding:20px 0">no presets</div>
        </div>
      </div>
      <div class="preset-detail" id="preset-detail">
        <div class="preset-detail-empty">select a preset</div>
      </div>
    </div>
  </div>

</div>
<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
const nodes    = new Map();
const links    = new Map();
const expanded = new Set();

let defaultSinkName   = null;   // matched against node.node_name
let defaultSourceName = null;
let graphHoverTarget  = null;   // { type:'node', id } | { type:'link', key:'outId-inId' } | null

const CLASS_TO_NC = {
  'Audio/Sink':          'nc-sinks',
  'Audio/Source':        'nc-sources',
  'Stream/Output/Audio': 'nc-play',
  'Stream/Input/Audio':  'nc-cap',
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function displayName(n)  { return n.node_nick || n.node_description || n.node_name || `#${n.id}`; }
function stateKey(state) { return typeof state === 'string' ? state : (state && typeof state === 'object') ? 'Error' : 'Unknown'; }
function stateLabel(state) {
  if (typeof state === 'string') return state;
  if (state && typeof state === 'object') { const k = Object.keys(state)[0]; return state[k] ? `Error: ${state[k]}` : 'Error'; }
  return 'Unknown';
}
function isDefaultNode(n) {
  if (n.media_class === 'Audio/Sink')   return defaultSinkName   && n.node_name === defaultSinkName;
  if (n.media_class === 'Audio/Source') return defaultSourceName && n.node_name === defaultSourceName;
  return false;
}
function chanFormat(n) {
  const ch = (n.media_class === 'Stream/Output/Audio') ? n.n_output_ports : n.n_input_ports;
  return ({1:'Mono', 2:'Stereo', 4:'Quad', 6:'5.1', 8:'7.1'})[ch] ?? (ch > 0 ? `${ch}ch` : '');
}

// ── Playing section ───────────────────────────────────────────────────────────
function playingHTML(sinkId) {
  const seen = new Set();
  const streams = [];
  for (const lnk of links.values()) {
    if (lnk.input_node !== sinkId) continue;
    if (seen.has(lnk.output_node)) continue;
    seen.add(lnk.output_node);
    const stream = nodes.get(lnk.output_node);
    if (!stream) continue;
    if (stream.media_class && !stream.media_class.startsWith('Stream/Output')) continue;
    streams.push({ stream, active: lnk.active });
  }
  if (streams.length === 0) return '';

  const rows = streams.map(({ stream: s }) => {
    const name = displayName(s), app = s.application_name || '', sk = stateKey(s.state);
    const lc = sk === 'Running' ? 'var(--green)' : sk === 'Idle' ? 'var(--amber)' : 'var(--slate)';
    const gw = sk === 'Running' ? `;box-shadow:0 0 4px var(--green)` : '';
    const fmt = chanFormat(s);
    return `<div class="playing-row">
      <div class="playing-led" style="background:${lc}${gw}"></div>
      <span class="playing-name" title="${esc(name)}">${esc(name)}</span>
      ${fmt ? `<span class="playing-fmt">${esc(fmt)}</span>` : ''}
      ${app ? `<span class="playing-app" title="${esc(app)}">${esc(app)}</span>` : ''}
    </div>`;
  }).join('');

  return `<div class="playing-wrap">
  <div class="playing-header"><div class="playing-dot"></div>Now Playing (${streams.length})</div>
  <div class="playing-list">${rows}</div>
</div>`;
}

// ── Card HTML ────────────────────────────────────────────────────────────────
function cardHTML(n) {
  const sk = stateKey(n.state), sl = stateLabel(n.state), name = displayName(n);
  const props = Object.entries(n.extra_props || {}), isExp = expanded.has(n.id);

  const appLine   = n.application_name ? `<div class="card-app">${esc(n.application_name)}${n.application_process_id != null ? `<span class="pid">pid:${n.application_process_id}</span>` : ''}</div>` : '';
  const mediaLine = n.media_name && n.media_name !== name ? `<div class="card-media">${esc(n.media_name)}</div>` : '';

  const ids = [['id', n.id], ['ser', n.serial ?? '—'], ...(n.client_id != null ? [['cli', n.client_id]] : []), ...(n.device_id != null ? [['dev', n.device_id]] : [])]
    .map(([k, v]) => `<div class="kv"><span class="kk">${k}</span><span class="kv-val">${v}</span></div>`).join('');

  const propsBlock = props.length > 0 ? `<div class="props-wrap">
  <button class="props-toggle${isExp?' open':''}" onclick="toggleProps(${n.id},this)">
    <span class="arr">▶</span> Properties <span style="color:var(--text-30)">(${props.length})</span>
  </button>
  <div class="props-body${isExp?' show':''}">
    ${props.sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>`<div class="prop"><span class="pk">${esc(k)}</span><span class="pv" title="${esc(v)}">${esc(v)}</span></div>`).join('')}
  </div>
</div>` : '';

  const defBadge = isDefaultNode(n) ? `<span class="badge badge-default">DEFAULT</span>` : '';

  return `<div class="card-body">
  <div class="led"></div>
  <div class="cc">
    <div class="card-name" title="${esc(name)}">${esc(name)}</div>
    <div class="badges"><span class="badge badge-cls">${esc(n.media_class||'')}</span><span class="badge badge-st">${esc(sl)}</span>${defBadge}</div>
    ${appLine}${mediaLine}
  </div>
  <div class="ports">
    <div class="prow"><span class="arr-in">↓</span><span>${n.n_input_ports}</span></div>
    <div class="prow"><span class="arr-out">↑</span><span>${n.n_output_ports}</span></div>
  </div>
</div>
<div class="card-foot">${ids}</div>
${n.media_class === 'Audio/Sink' ? playingHTML(n.id) : ''}${propsBlock}`;
}

// ── DOM ops ──────────────────────────────────────────────────────────────────
function upsertCard(n) {
  const ncId = CLASS_TO_NC[n.media_class]; if (!ncId) return;
  const sk = stateKey(n.state);
  let card = document.getElementById(`nd-${n.id}`);
  if (!card) {
    card = document.createElement('div');
    card.className = 'card entering'; card.id = `nd-${n.id}`; card.dataset.state = sk;
    card.innerHTML = cardHTML(n);
    document.getElementById(ncId).appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.remove('entering')));
  } else {
    card.dataset.state = sk; card.innerHTML = cardHTML(n);
  }
}

function removeCard(id) {
  const card = document.getElementById(`nd-${id}`); if (!card) return;
  card.classList.add('leaving');
  setTimeout(() => { card.remove(); updateCounts(); }, 250);
}

function renderAll() {
  Object.values(CLASS_TO_NC).forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = ''; });
  for (const n of nodes.values()) upsertCard(n);
  updateCounts();
}

function updateCounts() {
  let total = 0;
  for (const [k, id] of [['sinks','nc-sinks'],['sources','nc-sources'],['play','nc-play'],['cap','nc-cap']]) {
    const n = (document.getElementById(id)?.children.length) ?? 0;
    document.getElementById(`cnt-${k}`).textContent = n; total += n;
  }
  document.getElementById('total-n').textContent = total;
}

window.toggleProps = function(id, btn) {
  expanded.has(id) ? expanded.delete(id) : expanded.add(id);
  btn.classList.toggle('open'); btn.nextElementSibling.classList.toggle('show');
};

// ── Graph ─────────────────────────────────────────────────────────────────────
const GRAPH_COLS = {
  'Stream/Output/Audio': 30,
  'Audio/Sink':          280,
  'Audio/Source':        530,
  'Stream/Input/Audio':  780,
};
const GRAPH_COL_LABELS = {
  'Stream/Output/Audio': 'PLAYBACK',
  'Audio/Sink':          'SINKS',
  'Audio/Source':        'SOURCES',
  'Stream/Input/Audio':  'CAPTURE',
};
const GRAPH_NODE_COLOR = {
  'Audio/Sink':          '#2070d8',
  'Audio/Source':        '#10a858',
  'Stream/Output/Audio': '#8830e0',
  'Stream/Input/Audio':  '#d85010',
};
const NODE_W = 160, NODE_H = 68, NODE_GAP = 10, GRAPH_TOP = 32;

const nodePositions = new Map();
let drag = null, graphRafPending = false, currentTab = 'monitor';

(function() {
  try {
    const s = localStorage.getItem('pw-graph-positions');
    if (s) for (const [id, pos] of Object.entries(JSON.parse(s))) nodePositions.set(+id, pos);
  } catch {}
  if (localStorage.getItem('pw-oled') === '1') document.documentElement.classList.add('oled');
})();

function savePositions() {
  try { const o = {}; for (const [id, p] of nodePositions) o[id] = p; localStorage.setItem('pw-graph-positions', JSON.stringify(o)); } catch {}
}

function autoPos(n) {
  const x = GRAPH_COLS[n.media_class] ?? 930;
  const peers = [...nodes.values()].filter(m => (GRAPH_COLS[m.media_class] ?? 930) === x).sort((a,b) => a.id - b.id);
  return { x, y: GRAPH_TOP + Math.max(0, peers.findIndex(m => m.id === n.id)) * (NODE_H + NODE_GAP) };
}

function getPos(id) { const n = nodes.get(id); return nodePositions.get(id) ?? (n ? autoPos(n) : {x:0,y:0}); }

function ledCol(sk) { return ({Running:'#0fdb72',Idle:'#f0a020',Suspended:'#38505f',Creating:'#38a8f0',Error:'#f03838'})[sk] ?? '#38505f'; }
function trunc(s, m) { return s && s.length > m ? s.slice(0, m-1) + '…' : (s ?? ''); }

function nodeGroupSVG(n, pos) {
  const sk = stateKey(n.state);
  const name = esc(trunc(displayName(n), 20));
  const accent = GRAPH_NODE_COLOR[n.media_class] ?? '#38505f';
  const lc = ledCol(sk);
  const stTxt = esc(typeof n.state === 'string' ? n.state : 'Error');
  const clsSeg = esc((n.media_class || '').split('/').pop() ?? '');
  return `<g class="gnode" id="gn-${n.id}" data-id="${n.id}" transform="translate(${pos.x},${pos.y})">
  <rect class="nb" x="0" y="0" width="${NODE_W}" height="${NODE_H}" rx="3" ry="3"/>
  <rect x="0" y="0" width="3" height="${NODE_H}" rx="1.5" ry="1.5" fill="${accent}" stroke="none"/>
  <circle cx="13" cy="16" r="3.5" fill="${lc}" stroke="none"/>
  <text x="24" y="20" font-family="Oxanium,sans-serif" font-size="12" font-weight="500" fill="#b8ccd8">${name}</text>
  <text x="13" y="34" font-family="IBM Plex Mono,monospace" font-size="8.5" fill="#4e6578">${clsSeg}</text>
  <text x="13" y="47" font-family="IBM Plex Mono,monospace" font-size="8.5" fill="${lc}">${stTxt}</text>
  <text x="${NODE_W-7}" y="${NODE_H-15}" font-family="IBM Plex Mono,monospace" font-size="8" fill="#1e2d3c" text-anchor="end">#${n.id}</text>
  <text x="${NODE_W-7}" y="${NODE_H-5}"  font-family="IBM Plex Mono,monospace" font-size="8.5" fill="#273340" text-anchor="end">↓${n.n_input_ports} ↑${n.n_output_ports}</text>
</g>`;
}

// ── Graph hover ───────────────────────────────────────────────────────────────
function buildPairMap() {
  const pm = new Map();
  for (const lnk of links.values()) {
    const key = `${lnk.output_node}-${lnk.input_node}`;
    const ex  = pm.get(key);
    if (ex) { if (lnk.active) ex.active = true; }
    else {
      const oN = nodes.get(lnk.output_node), iN = nodes.get(lnk.input_node);
      if (oN && iN) pm.set(key, { oN, iN, active: lnk.active });
    }
  }
  return pm;
}

function applyGraphHoverClasses() {
  const svg = document.getElementById('graph-svg'); if (!svg) return;
  svg.querySelectorAll('.lk-hi-strong,.lk-hi-medium,.lk-near,.lk-faded')
    .forEach(el => el.classList.remove('lk-hi-strong','lk-hi-medium','lk-near','lk-faded'));
  svg.querySelectorAll('.gnode-focal,.gnode-hi,.gnode-near,.gnode-faded')
    .forEach(el => el.classList.remove('gnode-focal','gnode-hi','gnode-near','gnode-faded'));
  if (!graphHoverTarget) return;

  const pm = buildPairMap();

  if (graphHoverTarget.type === 'node') {
    const nid = graphHoverTarget.id;

    // Level 1: direct connections
    const directLinks = [...pm.values()].filter(({oN, iN}) => oN.id === nid || iN.id === nid);
    const single = directLinks.length === 1;
    const connIds = new Set([nid]);
    for (const {oN, iN} of directLinks) {
      connIds.add(oN.id); connIds.add(iN.id);
      const p = svg.querySelector(`#lk-${oN.id}-${iN.id}`);
      if (p) p.classList.add(single ? 'lk-hi-strong' : 'lk-hi-medium');
    }

    // Collect link-groups of all nodes in the focal+connected set
    const linkGroups = new Set();
    for (const id of connIds) {
      const lg = nodes.get(id)?.extra_props?.['node.link-group'];
      if (lg) linkGroups.add(lg);
    }

    // Nodes sharing those link-groups (but not already in connIds) → near
    const nearIds = new Set();
    if (linkGroups.size > 0) {
      for (const n of nodes.values()) {
        if (connIds.has(n.id)) continue;
        const lg = n.extra_props?.['node.link-group'];
        if (lg && linkGroups.has(lg)) nearIds.add(n.id);
      }
    }

    // Classify links
    svg.querySelectorAll('[id^="lk-"]').forEach(el => {
      if (el.classList.contains('lk-hi-strong') || el.classList.contains('lk-hi-medium')) return;
      el.classList.add('lk-faded');
    });

    // Classify nodes
    for (const n of nodes.values()) {
      const gn = svg.querySelector(`#gn-${n.id}`); if (!gn) continue;
      if (n.id === nid)            gn.classList.add('gnode-focal');
      else if (connIds.has(n.id)) gn.classList.add('gnode-hi');
      else if (nearIds.has(n.id)) gn.classList.add('gnode-near');
      else                         gn.classList.add('gnode-faded');
    }

  } else if (graphHoverTarget.type === 'link') {
    const key   = graphHoverTarget.key;
    const entry = pm.get(key);
    if (entry) {
      const p = svg.querySelector(`#lk-${key}`);
      if (p) p.classList.add('lk-hi-strong');
      svg.querySelectorAll('[id^="lk-"]').forEach(el => {
        if (!el.classList.contains('lk-hi-strong')) el.classList.add('lk-faded');
      });
      const connIds = new Set([entry.oN.id, entry.iN.id]);
      for (const n of nodes.values()) {
        const gn = svg.querySelector(`#gn-${n.id}`); if (!gn) continue;
        if (connIds.has(n.id)) gn.classList.add('gnode-hi');
        else                    gn.classList.add('gnode-faded');
      }
    }
  }
}

function renderGraph() {
  const svg = document.getElementById('graph-svg'); if (!svg) return;

  const posMap = new Map();
  for (const n of nodes.values()) posMap.set(n.id, getPos(n.id));

  let maxX = 980, maxY = 320;
  for (const p of posMap.values()) { maxX = Math.max(maxX, p.x + NODE_W + 50); maxY = Math.max(maxY, p.y + NODE_H + 50); }
  svg.setAttribute('width', String(maxX));
  svg.setAttribute('height', String(maxY));

  // ── Defs: dot-grid + arrowhead markers ────────────────────────
  let html = `<defs>
  <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.7" fill="#ffffff" fill-opacity="0.035"/>
  </pattern>
  <marker id="mk-play"    markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 z" fill="#8830e0" fill-opacity="0.75"/></marker>
  <marker id="mk-source"  markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 z" fill="#10a858" fill-opacity="0.75"/></marker>
  <marker id="mk-default" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 z" fill="#38505f" fill-opacity="0.75"/></marker>
</defs>`;

  // Dot-grid background
  html += `<rect width="${maxX}" height="${maxY}" fill="url(#dotgrid)"/>`;

  // Vertical divider between the two audio flows (between SINKS and SOURCES)
  const divX = (GRAPH_COLS['Audio/Sink'] + NODE_W + GRAPH_COLS['Audio/Source']) / 2;
  html += `<line x1="${divX}" y1="0" x2="${divX}" y2="${maxY}" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1" stroke-dasharray="4 8"/>`;

  // Column lanes
  for (const [cls, x] of Object.entries(GRAPH_COLS)) {
    const label = GRAPH_COL_LABELS[cls];
    const color = GRAPH_NODE_COLOR[cls] ?? '#38505f';
    html += `<rect x="${x-8}" y="20" width="${NODE_W+16}" height="${maxY-26}" rx="4" fill="${color}" fill-opacity="0.025" stroke="none"/>`;
    html += `<text x="${x + NODE_W/2}" y="14" font-family="Oxanium,sans-serif" font-size="9" font-weight="600" letter-spacing="2.5" fill="${color}" fill-opacity="0.45" text-anchor="middle">${label}</text>`;
  }

  // Links — dedup by (output_node, input_node)
  const pairMap = new Map();
  for (const lnk of links.values()) {
    const key = `${lnk.output_node}-${lnk.input_node}`;
    const ex  = pairMap.get(key);
    if (ex) { if (lnk.active) ex.active = true; }
    else { const oN = nodes.get(lnk.output_node), iN = nodes.get(lnk.input_node); if (oN && iN) pairMap.set(key, {oN, iN, active: lnk.active}); }
  }
  for (const {oN, iN, active} of pairMap.values()) {
    const op = posMap.get(oN.id), ip = posMap.get(iN.id); if (!op || !ip) continue;
    const x1 = op.x + NODE_W, y1 = op.y + NODE_H/2, x2 = ip.x, y2 = ip.y + NODE_H/2;
    const cx = Math.max(40, Math.abs(x2-x1) * 0.45);
    const d  = `M ${x1} ${y1} C ${x1+cx} ${y1} ${x2-cx} ${y2} ${x2} ${y2}`;
    const color = GRAPH_NODE_COLOR[oN.media_class] ?? '#38505f';
    const mk = oN.media_class === 'Stream/Output/Audio' ? 'mk-play' : oN.media_class === 'Audio/Source' ? 'mk-source' : 'mk-default';
    // Wide transparent hit area makes thin curves easy to hover
    html += `<path class="lk-hit" data-key="${oN.id}-${iN.id}" d="${d}" fill="none" stroke="transparent" stroke-width="10"/>`;
    if (active) {
      html += `<path id="lk-${oN.id}-${iN.id}" d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-opacity="0.65" class="lk-active" marker-end="url(#${mk})"/>`;
    } else {
      html += `<path id="lk-${oN.id}-${iN.id}" d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-opacity="0.18" stroke-dasharray="4 6" marker-end="url(#${mk})"/>`;
    }
  }

  // Nodes on top
  for (const n of nodes.values()) html += nodeGroupSVG(n, posMap.get(n.id));

  svg.innerHTML = html;
  applyGraphHoverClasses();
}

function scheduleGraphRender() {
  if (graphRafPending) return;
  graphRafPending = true;
  requestAnimationFrame(() => { graphRafPending = false; renderGraph(); });
}

// ── Hash-based routing ────────────────────────────────────────────────────────
// Format: #monitor | #graph | #mixer | #presets[/{id}[/c{idx}]] | #mics[/{id}]
let suppressHashSync = false;

function syncHash() {
  if (suppressHashSync) return;
  let h = '#' + currentTab;
  if (currentTab === 'presets' && selectedPresetId) {
    h += '/' + encodeURIComponent(selectedPresetId);
    if (typeof expandedChainIdx === 'number' && expandedChainIdx >= 0) {
      h += '/c' + expandedChainIdx;
    }
  } else if (currentTab === 'mics' && selectedMicId) {
    h += '/' + encodeURIComponent(selectedMicId);
  }
  if (location.hash !== h) {
    suppressHashSync = true;
    history.replaceState(null, '', h);
    setTimeout(() => { suppressHashSync = false; }, 0);
  }
}

function applyHash() {
  const raw = (location.hash || '').replace(/^#/, '');
  if (!raw) { switchTab(currentTab || 'monitor', { fromHash: true }); return; }
  const parts = raw.split('/').map(decodeURIComponent);
  const tab = parts[0];
  const validTabs = ['monitor','graph','presets','mics','mixer','sounds'];
  if (!validTabs.includes(tab)) return;
  if (tab === 'presets') {
    selectedPresetId = parts[1] || null;
    expandedChainIdx = null;
    if (parts[2] && parts[2].startsWith('c')) {
      const n = parseInt(parts[2].slice(1), 10);
      if (Number.isFinite(n)) expandedChainIdx = n;
    }
  } else if (tab === 'mics') {
    selectedMicId = parts[1] || null;
  }
  switchTab(tab, { fromHash: true });
}
window.addEventListener('hashchange', applyHash);

// ── Drag ──────────────────────────────────────────────────────────────────────
function svgCoord(e) {
  const rect = document.getElementById('graph-svg').getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
document.addEventListener('mousedown', e => {
  if (currentTab !== 'graph') return;
  const g = e.target.closest('[data-id]');
  if (!g || !g.closest('#graph-svg')) return;
  e.preventDefault();
  const id = +g.dataset.id, pos = getPos(id), pt = svgCoord(e);
  drag = { id, startX: pt.x, startY: pt.y, origX: pos.x, origY: pos.y };
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const pt = svgCoord(e);
  nodePositions.set(drag.id, { x: Math.max(0, drag.origX + pt.x - drag.startX), y: Math.max(0, drag.origY + pt.y - drag.startY) });
  scheduleGraphRender();
});
window.addEventListener('mouseup', () => { if (drag) { savePositions(); drag = null; } });

// ── Graph hover events ────────────────────────────────────────────────────────
(function() {
  const gc = document.getElementById('graph-container');
  gc.addEventListener('mouseover', e => {
    if (currentTab !== 'graph') return;
    let t = null;
    if (e.target.classList && e.target.classList.contains('lk-hit')) {
      t = { type: 'link', key: e.target.dataset.key };
    } else if (e.target.id && e.target.id.startsWith('lk-')) {
      t = { type: 'link', key: e.target.id.slice(3) };
    } else {
      const gn = e.target.closest && e.target.closest('.gnode');
      if (gn) t = { type: 'node', id: +gn.dataset.id };
    }
    const same = t
      ? graphHoverTarget && graphHoverTarget.type === t.type &&
        (t.type === 'node' ? graphHoverTarget.id === t.id : graphHoverTarget.key === t.key)
      : !graphHoverTarget;
    if (!same) { graphHoverTarget = t; applyGraphHoverClasses(); }
  });
  gc.addEventListener('mouseleave', () => {
    if (graphHoverTarget) { graphHoverTarget = null; applyGraphHoverClasses(); }
  });
})();

// ── WebSocket ────────────────────────────────────────────────────────────────
let ws = null, reconnDelay = 1000;
const MAX_DELAY = 30_000;

function setStatus(cls, text) {
  document.getElementById('ws-pill').className = `ws-pill ${cls}`;
  document.getElementById('ws-txt').textContent = text;
}
function refreshSinksFor(streamId) {
  for (const lnk of links.values()) {
    if (lnk.output_node !== streamId) continue;
    const sink = nodes.get(lnk.input_node); if (sink) upsertCard(sink);
  }
}

function handleMsg(msg) {
  const g = currentTab === 'graph';
  switch (msg.type) {
    case 'Snapshot':
      nodes.clear(); links.clear();
      msg.data.nodes.forEach(n => nodes.set(n.id, n));
      msg.data.links.forEach(l => links.set(l.id, l));
      defaultSinkName   = msg.data.default_sink   ?? null;
      defaultSourceName = msg.data.default_source ?? null;
      renderAll(); if (g) renderGraph();
      if (currentTab === 'mixer') renderMixer();
      break;
    case 'DefaultsChanged':
      defaultSinkName   = msg.data.sink_name   ?? null;
      defaultSourceName = msg.data.source_name ?? null;
      for (const n of nodes.values()) {
        if (n.media_class === 'Audio/Sink' || n.media_class === 'Audio/Source') upsertCard(n);
      }
      if (g) scheduleGraphRender(); break;
    case 'NodeAdded':
      if (currentTab === 'sounds' && msg.data && msg.data.media_class === 'Audio/Sink') refreshTargetOptions();
      nodes.set(msg.data.id, msg.data); upsertCard(msg.data); updateCounts();
      if (g) scheduleGraphRender();
      if (currentTab === 'presets' && msg.data.node_name?.startsWith('pw-ctrl.preset.'))
        { renderPresetList(); renderPresetDetail(); }
      if (currentTab === 'mixer') renderMixer();
      break;
    case 'NodeUpdated':
      nodes.set(msg.data.id, msg.data); upsertCard(msg.data);
      if (msg.data.media_class === 'Stream/Output/Audio') refreshSinksFor(msg.data.id);
      updateCounts(); if (g) scheduleGraphRender();
      if (currentTab === 'presets') renderPresetDetail();
      if (currentTab === 'mixer') scheduleMixerRender();
      break;
    case 'NodeRemoved':
      nodes.delete(msg.data.id); removeCard(msg.data.id);
      if (g) scheduleGraphRender();
      if (currentTab === 'presets') { renderPresetList(); renderPresetDetail(); }
      if (currentTab === 'mixer') renderMixer();
      break;
    case 'LinkAdded':
    case 'LinkUpdated':
      links.set(msg.data.id, msg.data);
      { const sink = nodes.get(msg.data.input_node); if (sink) upsertCard(sink); }
      if (g) scheduleGraphRender();
      if (currentTab === 'presets') renderPresetDetail();
      break;
    case 'LinkRemoved':
      { const lnk = links.get(msg.data.id); links.delete(msg.data.id);
        if (lnk) { const sink = nodes.get(lnk.input_node); if (sink) upsertCard(sink); } }
      if (g) scheduleGraphRender();
      if (currentTab === 'presets') renderPresetDetail();
      break;
    case 'PresetActivated':
    case 'PresetDeactivated':
      if (currentTab === 'presets') { renderPresetList(); renderPresetDetail(); }
      break;
    case 'VirtualMicCreated':
    case 'VirtualMicDestroyed':
      if (currentTab === 'mics') { renderMicList(); renderMicDetail(); }
      break;
    case 'PlaybackStarted': {
      const d = msg.data || {};
      activePlaybacks.set(d.playback_id, {
        playback_id: d.playback_id,
        clip_id: d.clip_id,
        target_node_name: d.target_node_name,
        duration_ms: d.duration_ms,
        volume: 1.0, loop_mode: false,
      });
      if (currentTab === 'sounds') { renderActivePlaybacks(); renderSounds(); }
      break;
    }
    case 'PlaybackEnded': {
      const d = msg.data || {};
      activePlaybacks.delete(d.playback_id);
      if (currentTab === 'sounds') { renderActivePlaybacks(); renderSounds(); }
      break;
    }
  }
}

function connect() {
  setStatus('connecting', 'Connecting…');
  let sock;
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  try { sock = new WebSocket(`${wsProto}//${location.host}/ws`); } catch { return scheduleReconnect(); }
  ws = sock;
  sock.onopen    = () => {
    reconnDelay = 1000; setStatus('connected', 'Connected');
    fetchPresets();
    fetchVirtualMics();
  };
  sock.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(err) { console.error('parse error', err); } };
  sock.onclose   = () => scheduleReconnect();
  sock.onerror   = () => {};
}

function scheduleReconnect() {
  const d = reconnDelay; reconnDelay = Math.min(reconnDelay * 1.6, MAX_DELAY);
  setStatus('reconnecting', `Reconnect in ${Math.round(d/1000)}s`);
  setTimeout(connect, d);
}

function isPresetActive(preset) {
  const target = `pw-ctrl.preset.${preset.id}`;
  for (const n of nodes.values()) { if (n.node_name === target) return true; }
  return false;
}

function getRoutedStreams(presetId) {
  const preset = presets.get(presetId); if (!preset) return { routed: [], free: [] };
  const target  = `pw-ctrl.preset.${preset.id}`;
  let   nodeId  = null;
  for (const n of nodes.values()) { if (n.node_name === target) { nodeId = n.id; break; } }

  const routedIds = new Set();
  const routed = [];
  if (nodeId !== null) {
    const seen = new Set();
    for (const lnk of links.values()) {
      if (lnk.input_node !== nodeId || seen.has(lnk.output_node)) continue;
      seen.add(lnk.output_node);
      const s = nodes.get(lnk.output_node);
      if (s && s.media_class === 'Stream/Output/Audio') { routed.push(s); routedIds.add(s.id); }
    }
  }
  const free = [];
  for (const n of nodes.values()) {
    if (n.media_class === 'Stream/Output/Audio'
      && !routedIds.has(n.id)
      && !n.node_name?.startsWith('pw-ctrl.')) free.push(n);
  }
  return { routed, free };
}

// ── Preset REST helpers ───────────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  if (r.status === 204) return null;
  return r.json();
}

async function fetchPresets() {
  try {
    const list = await apiFetch('GET', '/presets');
    presets.clear();
    for (const p of list) presets.set(p.id, p);
    renderPresetList();
    if (selectedPresetId && !presets.has(selectedPresetId)) selectedPresetId = null;
    renderPresetDetail();
  } catch(e) { console.error('fetchPresets', e); }
}

const lv2Details = new Map();           // uri → full plugin (with ports), lazy
const lv2CustomUI = new Map();          // uri → { exists, path } cache
const ladspaCatalog = new Map();        // key → { key, path, label, name, unique_id }
const ladspaDetails = new Map();        // key → full plugin (with ports), lazy
